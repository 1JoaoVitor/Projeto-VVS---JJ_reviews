\r\n  const key = normalizeText(name);\r\n  return COUNTRY_PTBR_MAP[key] || name;\r\n}\r\n\r\nexport function normalizeCountriesToPtBr(countries: string[]): string[] {\r\n  return countries.map(toPtBrCountry);\r\n}\r\n\r\nexport function getYearDirectionHint(guessYear?: number, targetYear?: number): string {\r\n  if (!guessYear || !targetYear || guessYear === targetYear) {\r\n    return \"\";\r\n  }\r\n\r\n  return guessYear <"+" targetYear ? \" ↑ mais atual\" : \" ↓ mais antigo\";\r\n}\r\n\r\nexport function compareMovieProfiles(guess: GameMovieProfile, target: GameMovieProfile): GuessResult {\r\n  const normGuessDirector = normalizeText(guess.director);\r\n  const normTargetDirector = normalizeText(target.director);\r\n\r\n  let directorStatus: GuessStatus = \"wrong\";\r\n  if (normGuessDirector && normTargetDirector) {\r\n    if (normGuessDirector === normTargetDirector) {\r\n      directorStatus = \"correct\";\r\n    } else if (normGuessDirector.includes(normTargetDirector) || normTargetDirector.includes(normGuessDirector)) {\r\n      directorStatus = \"close\";\r\n    }\r\n  }\r\n\r\n  let yearStatus: GuessStatus = \"wrong\";\r\n  if (guess.releaseYear && target.releaseYear) {\r\n    const diff = Math.abs(guess.releaseYear - target.releaseYear);\r\n    yearStatus = diff === 0 ? \"correct\" : diff <"+"= 5 ? \"close\" : \"wrong\";\r\n  }\r\n\r\n  const guessGenres = guess.genres.map(normalizeText);\r\n  const targetGenres = target.genres.map(normalizeText);\r\n  const genreStatus: GuessStatus = guessGenres.some((genre) => targetGenres.includes(genre))\r\n    ? \"correct\"\r\n    : guessGenres.some((genre) => targetGenres.some((targetGenre) => targetGenre.includes(genre) || genre.includes(targetGenre)))\r\n      ? \"close\"\r\n      : \"wrong\";\r\n\r\n  const guessCountries = guess.countries.map(normalizeText);\r\n  const targetCountries = target.countries.map(normalizeText);\r\n  const matchesCount = targetCountries.filter((country) => guessCountries.includes(country)).length;\r\n  const countryStatus: GuessStatus =\r\n    targetCountries.length > 0 && matchesCount === targetCountries.length\r\n      ? \"correct\"\r\n      : matchesCount > 0\r\n        ? \"close\"\r\n        : \"wrong\";\r\n\r\n  const guessCast = guess.cast.map(normalizeText);\r\n  const targetCast = target.cast.map(normalizeText);\r\n  const castMatches = targetCast.filter((actor) => guessCast.includes(actor)).length;\r\n  const castStatus: GuessStatus =\r\n    targetCast.length > 0 && castMatches === targetCast.length\r\n      ? \"correct\"\r\n      : castMatches > 0\r\n        ? \"close\"\r\n        : \"wrong\";\r\n\r\n  let runtimeStatus: GuessStatus = \"wrong\";\r\n  if (guess.runtime && target.runtime) {\r\n    const diff = Math.abs(guess.runtime - target.runtime);\r\n    runtimeStatus = diff <"+"= 7 ? \"correct\" : diff <"+"= 20 ? \"close\" : \"wrong\";\r\n  }\r\n\r\n  const yearDirectionHint = getYearDirectionHint(guess.releaseYear, target.releaseYear);\r\n\r\n  const fields: GuessFieldResult[] = [\r\n    {\r\n      label: \"Diretor\",\r\n      guessed: guess.director || \"Nao informado\",\r\n      target: target.director || \"Nao informado\",\r\n      status: directorStatus,\r\n    },\r\n    {\r\n      label: \"Ano\",\r\n      guessed: `${guess.releaseYear ? String(guess.releaseYear) : \"Nao informado\"}${yearDirectionHint}`,\r\n      target: target.releaseYear ? String(target.releaseYear) : \"Nao informado\",\r\n      status: yearStatus,\r\n    },\r\n    {\r\n      label: \"Genero\",\r\n      guessed: getListLabel(guess.genres),\r\n      target: getListLabel(target.genres),\r\n      status: genreStatus,\r\n    },\r\n    {\r\n      label: \"Paises\",\r\n      guessed: getListLabel(guess.countries),\r\n      target: getListLabel(target.countries),\r\n      status: countryStatus,\r\n    },\r\n    {\r\n      label: \"Ator/Atriz principal\",\r\n      guessed: getListLabel(guess.cast),\r\n      target: getListLabel(target.cast),\r\n      status: castStatus,\r\n    },\r\n    {\r\n      label: \"Duracao\",\r\n      guessed: guess.runtime ? `${guess.runtime} min` : \"Nao informada\",\r\n      target: target.runtime ? `${target.runtime} min` : \"Nao informada\",\r\n      status: runtimeStatus,\r\n    },\r\n  ];\r\n\r\n  return {\r\n    guessTitle: guess.title,\r\n    fields,\r\n    isCorrect: guess.tmdbId === target.tmdbId,\r\n  };\r\n}\r\n\r\nexport function buildGuessSummary(guesses: GuessResult[], lives: number) {\r\n  const rank: Record<"+"GuessStatus, number> = { wrong: 1, close: 2, correct: 3 };\r\n  const bestByField = new Map<"+"string, { status: GuessStatus; guessed: string }>();\r\n\r\n  for (const guess of guesses) {\r\n    for (const field of guess.fields) {\r\n      const previous = bestByField.get(field.label);\r\n      if (!previous || rank[field.status] > rank[previous.status]) {\r\n        bestByField.set(field.label, { status: field.status, guessed: field.guessed });\r\n      }\r\n    }\r\n  }\r\n\r\n  return {\r\n    attempts: guesses.length,\r\n    livesLeft: lives,\r\n    fields: Array.from(bestByField.entries()).map(([label, value]) => ({ label, ...value })),\r\n  };\r\n}\r\n\r\nexport function shouldUseTmdbSuggestions(source: DailySourceMode): boolean {\r\n  return source === \"global_daily\";\r\n}\r\n\r\nexport function getCoverRevealState(livesLeft: number, isWon: boolean, maxLives = 6) {\r\n  const clampedLives = Math.max(0, Math.min(maxLives, livesLeft));\r\n  const livesLost = maxLives - clampedLives;\r\n\r\n  // Slightly denser grid while keeping the poster low-res for a pixelated look.\r\n  const gridSize = 10;\r\n  const totalTiles = gridSize * gridSize;\r\n  // Non-linear progression: early misses reveal less, later misses reveal more.\r\n  const revealRatio = isWon ? 1 : Math.pow(livesLost / maxLives, 1.45);\r\n\r\n  const revealTiles = Math.round(totalTiles * revealRatio);\r\n  const blurPx = isWon ? 0 : Math.max(0, 58 * (clampedLives / maxLives));\r\n  const posterSize = isWon ? \" known[] em vez de any[] porque, se precisar ler isso no Core, \r\n   // o TypeScript obriga a fazer a checagem de tipo (type narrowing).\r\n   list_group_reviews?: unknown[];\r\n}\r\n\r\nexport interface TmdbRawResponse {\r\n   title?: string;\r\n   overview?: string;\r\n   poster_path?: string;\r\n   runtime?: number;\r\n   release_date?: string;\r\n   genres?: { id: number; name: string }[];\r\n   production_countries?: { iso_3166_1: string; name: string }[];\r\n   credits?: {\r\n      crew?: { job: string; name: string }[];\r\n      cast?: { name: string }[];\r\n   };\r\n   \"watch/providers\"?: {\r\n      results?: {\r\n         BR?: {\r\n            flatrate?: TmdbProvider[];\r\n         };\r\n      };\r\n   };\r\n}\r\n\r\nexport function mapTmdbToMovieData(\r\n   supabaseRow: BaseMovieRow,\r\n   tmdbData: TmdbRawResponse,\r\n   oscarNomineesIds: number[] = []\r\n): MovieData {\r\n   \r\n   const directors = tmdbData.credits?.crew\r\n      ?.filter((p) => p.job === \"Director\")\r\n      .map((d) => d.name)\r\n      .join(\", \") || \"Desconhecido\";\r\n\r\n   const cast = tmdbData.credits?.cast\r\n      ?.slice(0, 5)\r\n      .map((c) => c.name) || [];\r\n\r\n   const genres = tmdbData.genres?.map((g) => g.name) || [];\r\n\r\n   const rawCountries = tmdbData.production_countries || [];\r\n   \r\n   // Tradução nativa e dinâmica com Intl.DisplayNames\r\n   const translatedCountries = rawCountries.map((c) => {\r\n      try {\r\n         const translated = regionNames.of(c.iso_3166_1);\r\n         return translated && translated !== c.iso_3166_1 ? translated : c.name;\r\n      } catch {\r\n         return c.name;\r\n      }\r\n   });\r\n\r\n   const isNational = rawCountries.some((c) => c.iso_3166_1 === \"BR\");\r\n   const isOscar = oscarNomineesIds.includes(supabaseRow.tmdb_id);\r\n\r\n   const providers = tmdbData[\"watch/providers\"]?.results?.BR?.flatrate || [];\r\n\r\n   return {\r\n      ...supabaseRow,\r\n      title: tmdbData.title || \"Título Desconhecido\",\r\n      overview: tmdbData.overview || \"Sinopse indisponível.\",\r\n      poster_path: tmdbData.poster_path || \"\",\r\n      release_date: tmdbData.release_date || \"\",\r\n      runtime: tmdbData.runtime || 0,\r\n      director: directors,\r\n      cast,\r\n      genres,\r\n      countries: translatedCountries,\r\n      isNational,\r\n      isOscar,\r\n      providers,\r\n   } as MovieData;\r\n}"},"src/features/movies/logic/filterMovies.ts":{"language":"typescript","mutants":[{"id":"643","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":52,"line":16},"start":{"column":43,"line":16}}},{"id":"681","mutatorName":"BooleanLiteral","replacement":"movie.genres?.includes(filters.selectedGenre)","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":82,"line":24},"start":{"column":36,"line":24}}},{"id":"682","mutatorName":"OptionalChaining","replacement":"movie.genres.includes","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":59,"line":24},"start":{"column":37,"line":24}}},{"id":"683","mutatorName":"BooleanLiteral","replacement":"true","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":96,"line":24},"start":{"column":91,"line":24}}},{"id":"717","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":35,"line":36},"start":{"column":28,"line":36}}},{"id":"637","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Target cannot be null or undefined.","status":"Killed","static":false,"testsCompleted":1,"killedBy":["128"],"coveredBy":["128","129","130","131","132","133","134"],"location":{"end":{"column":2,"line":39},"start":{"column":87,"line":13}}},{"id":"638","mutatorName":"MethodExpression","replacement":"movies","statusReason":"expected [ { id: 1, tmdb_id: 100, …(8) }, …(1) ] to have a length of 1 but got 2","status" ;\r\n   });\r\n}"},"src/features/movies/logic/sortMovies.ts":{"language":"typescript","mutants":[{"id":"737","mutatorName":"StringLiteral","replacement":"\"\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":100,"line":11},"start":{"column":94,"line":11}}},{"id":"743","mutatorName":"StringLiteral","replacement":"\"Stryker was here!\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":34,"line":13},"start":{"column":32,"line":13}}},{"id":"747","mutatorName":"StringLiteral","replacement":"\"Stryker was here!\"","status":"NoCoverage","static":false,"coveredBy":[],"location":{"end":{"column":63,"line":13},"start":{"column":61,"line":13}}},{"id":"718","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'map')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["71"],"coveredBy":["71","72","73","74","75","76","77"],"location":{"end":{"column":2,"line":18},"start":{"column":80,"line":5}}},{"id":"719","mutatorName":"MethodExpression","replacement":"[...movies]","statusReason":"expected [ 5, 9, 7 ] to deeply equal [ 9, 7, 5 ]","status":"Killed","static":false,"testsCompleted":1,"killedBy":["71"],"coveredBy":["71","72","73","74","75","76","77"],"location":{"end":{"column":6,"line":17},"start":{"column":11,"line":6}}},{"id":"720","mutatorName":"ArrayDeclaration","replacement":"[]","statusReason":"expected [] to deeply equal [ 9, 7, 5 ]","status":"Killed","static":false,"testsCompleted":1,"killedBy":["71"],"coveredBy":["71","72","73","74","75","76","77"],"location":{"end":{"column":22,"line":6},"start":{"column":11,"line":6}}},{"id":"721","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected [ 5, 9, 7 ] to deeply equal [ 9, 7, 5 ]","status":"Killed","static":false,"testsCompleted":1,"killedBy":["71"],"coveredBy":["71","72","73","74","75","76"],"location":{"end":{"column":5,"line":17},"start":{"column":38,"line":6}}},{"id":"72 ck: vi.fn(),\r\n  selectMock: vi.fn(),\r\n  orMock: vi.fn(),\r\n  inMock: vi.fn(),\r\n}));\r\n\r\nvi.mock(\"react-router-dom\", () => ({\r\n  useNavigate: () => navigateMock,\r\n  useSearchParams: () => [new URLSearchParams(), setSearchParamsMock],\r\n}));\r\n\r\nvi.mock(\"@/features/movies/services/tmdbService\", () => ({\r\n  getMovieDetails: getMovieDetailsMock,\r\n}));\r\n\r\nvi.mock(\"../../../hooks/useDiary\", () => ({\r\n  useDiary: useDiaryMock,\r\n}));\r\n\r\nvi.mock(\"../../../hooks/useFriendDiaryActivities\", () => ({\r\n  useFriendDiaryActivities: useFriendDiaryActivitiesMock,\r\n}));\r\n\r\nvi.mock(\"@/features/friends/services/friendshipService\", () => ({\r\n  fetchFriendshipsForTargets: vi.fn().mockResolvedValue([]),\r\n  createFriendRequest: vi.fn().mockResolvedValue(undefined),\r\n  notifyFriendRequest: vi.fn().mockResolvedValue(undefined),\r\n  acceptFriendRequest: vi.fn().mockResolvedValue(undefined),\r\n  notifyFriendAccepted: vi.fn().mockResolvedValue(undefined),\r\n  deleteIncomingFriendRequest: vi.fn().mockResolvedValue(undefined),\r\n  deleteFriendshipBetween: vi.fn().mockResolvedValue(undefined),\r\n}));\r\n\r\nvi.mock(\"@/lib/supabase\", () => ({\r\n  supabase: {\r\n    from: fromMock,\r\n  },\r\n}));\r\n\r\nimport { DiaryPage } from \"../DiaryPage\";\r\n\r\nfunction mockSupabaseEmptyResponses() {\r\n  const orderMock = vi.fn().mockReturnThis();\r\n  const limitMock = vi.fn().mockResolvedValue({ data: [], error: null });\r\n\r\n  const chain = {\r\n    select: selectMock,\r\n    or: orMock,\r\n    in: inMock,\r\n    order: orderMock,\r\n    limit: limitMock,\r\n    eq: vi.fn().mockReturnThis(),\r\n    ilike: vi.fn().mockReturnThis(),\r\n    neq: vi.fn().mockReturnThis(),\r\n  };\r\n\r\n  selectMock.mockReturnValue(chain);\r\n  orMock.mockReturnValue(chain);\r\n  inMock.mockReturnValue(chain);\r\n  fromMock.mockReturnValue(chain);\r\n}\r\n\r\ndescribe(\"DiaryPage\", () => {\r\n  beforeEach(() => {\r\n    vi.clearAllMocks();\r\n    mockSupabaseEmptyResponses();\r\n\r\n    useDiaryMock.mockReturnValue({\r\n      entries: [\r\n        {\r\n          id: \"d1\",\r\n          user_id: \"u1\",\r\n          tmdb_id: 10,\r\n          watched_date: \"2026-03-20\",\r\n          created_at: \"2026-03-20T12:00:00.000Z\",\r\n        },\r\n      ],\r\n      loading: false,\r\n      error: null,\r\n      refresh: vi.fn(),\r\n      removeEntry: vi.fn(),\r\n      notifyFriendActivity: false,\r\n      setNotifyFriendActivity: vi.fn(),\r\n    });\r\n\r\n    useFriendDiaryActivitiesMock.mockReturnValue({\r\n      activities: [\r\n        {\r\n          id: \"a1\",\r\n          user_id: \"u2\",\r\n          tmdb_id: 777,\r\n          watched_date: \"2026-03-21\",\r\n          created_at: \"2026-03-21T12:00:00.000Z\",\r\n          friend_id: \"u2\",\r\n          friend_username: \"maria\",\r\n          friend_avatar_url: null,\r\n          rating: 9,\r\n        },\r\n      ],\r\n      loading: false,\r\n      error: null,\r\n      refresh: vi.fn(),\r\n    });\r\n  });\r\n\r\n  it(\"opens local movie via onOpenMovie when entry exists in loaded movies\", async () => {\r\n    const onOpenMovie = vi.fn();\r\n\r\n    render(\r\n      <"+"DiaryPage\r\n        userId=\"u1\"\r\n        onOpenMovie={onOpenMovie}\r\n        movies={[\r\n          {\r\n            id: 1,\r\n            tmdb_id: 10,\r\n            title: \"Matrix\",\r\n            rating: 9,\r\n            review: \"\",\r\n            recommended: \"\",\r\n            created_at: \"2026-03-20T12:00:00.000Z\",\r\n          },\r\n        ]}\r\n      />\r\n    );\r\n\r\n    await userEvent.click(screen.getByRole(\"button\", { name: /abrir filme matrix/i }));\r\n\r\n    await waitFor(() => {\r\n      expect(onOpenMovie).toHaveBeenCalled();\r\n    });\r\n  });\r\n\r\n  it(\"falls back to TMDB details when friend activity movie is not in local list\", async () => {\r\n    const onOpenMovie = vi.fn();\r\n    getMovieDetailsMock.mockResolvedValue({\r\n      id: 777,\r\n      title: \"Fallback Movie\",\r\n      poster_path: null,\r\n      release_date: \"2026-01-01\",\r\n      overview: \"overview\",\r\n      runtime: 120,\r\n      credits: { crew: [], cast: [] },\r\n      production_countries: [],\r\n      genres: [],\r\n    });\r\n\r\n    render(<"+"DiaryPage userId=\"u1\" onOpenMovie={onOpenMovie} movies={[]} />);\r\n\r\n    await userEvent.click(screen.getByRole(\"button\", { name: /abrir filme filme #777/i }));\r\n\r\n    await waitFor(() => {\r\n      expect(getMovieDetailsMock).toHaveBeenCalledWith(777);\r\n      expect(onOpenMovie).toHaveBeenCalledWith(\r\n        expect.objectContaining({\r\n          tmdb_id: 777,\r\n          title: \"Fallback Movie\",\r\n        })\r\n      );\r\n    });\r\n  });\r\n\r\n  it(\"separates diary and friend management into different tabs\", async () => {\r\n    render(<"+"DiaryPage userId=\"u1\" movies={[]} />);\r\n\r\n    expect(screen.getByText(/sua atividade/i)).toBeInTheDocument();\r\n    expect(screen.queryByText(/gerenciar amigos/i)).not.toBeInTheDocument();\r\n\r\n    await userEvent.click(screen.getByRole(\"tab\", { name: /amigos/i }));\r\n\r\n    expect(screen.getByText(/gerenciar amigos/i)).toBeInTheDocument();\r\n    expect(screen.queryByText(/sua atividade/i)).not.toBeInTheDocument();\r\n  });\r\n});\r\n"},"src/features/notifications/components/NotificationBell/__tests__/NotificationBell.test.tsx":{"tests":[{"id":"12","name":"NotificationBell navigates to /social diary tab when clicking movie_added notification"}],"source":"import { render, screen } from \"@testing-library/react\";\r\nimport userEvent from \"@testing-library/user-event\";\r\nimport { beforeEach, describe, expect, it, vi } from \"vitest\";\r\n\r\nconst { navigateMock, markAsReadMock, markAllAsReadMock } = vi.hoisted(() => ({\r\n  navigateMock: vi.fn(),\r\n  markAsReadMock: vi.fn(),\r\n  markAllAsReadMock: vi.fn(),\r\n}));\r\n\r\nvi.mock(\"react-router-dom\", () => ({\r\n  useNavigate: () => navigateMock,\r\n}));\r\n\r\nvi.mock(\"@/features/notifications/hooks/useNotifications\", () => ({\r\n  useNotifications: vi.fn(() => ({\r\n    notifications: [\r\n      {\r\n        id: \"n1\",\r\n        user_id: \"u1\",\r\n        sender_id: \"u2\",\r\n        type: \"movie_added\",\r\n        message: \"registrou um filme no diary\",\r\n        is_read: false,\r\n        created_at: new Date().toISOString(),\r\n        sender: {\r\n          username: \"amigo\",\r\n          avatar_url: null,\r\n        },\r\n      },\r\n    ],\r\n    unreadCount: 1,\r\n    loading: false,\r\n    markAsRead: markAsReadMock,\r\n    markAllAsRead: markAllAsReadMock,\r\n  })),\r\n}));\r\n\r\nimport { NotificationBell } from \"../NotificationBell\";\r\n\r\ndescribe(\"NotificationBell\", () => {\r\n  beforeEach(() => {\r\n    vi.clearAllMocks();\r\n  });\r\n\r\n  it(\"navigates to /social diary tab when clicking movie_added notification\", async () => {\r\n    render(<"+"NotificationBell userId=\"u1\" />);\r\n\r\n    await userEvent.click(screen.getByRole(\"button\"));\r\n\r\n    const notificationMessage = await screen.findByText((content) => content.includes(\"registrou um filme no diary\"));\r\n    await userEvent.click(notificationMessage.closest(\"div\") || notificationMessage);\r\n\r\n    expect(markAsReadMock).toHaveBeenCalledWith(\"n1\");\r\n    expect(navigateMock).toHaveBeenCalledWith(\"/social?tab=diary\");\r\n  });\r\n});\r\n"},"src/features/auth/hooks/__tests__/useAuthState.test.ts":{"tests":[{"id":"13","name":"useAuthState loads session profile on startup"},{"id":"14","name":"useAuthState reacts to auth state changes"},{"id":"15","name":"useAuthState logout delegates to auth service"}],"source":"import { renderHook, waitFor, act } from \"@testing-library/react\";\r\nimport { beforeEach, describe, expect, it, vi } from \"vitest\";\r\n\r\nconst {\r\n   getCurrentSessionMock,\r\n   fetchProfileByUserIdMock,\r\n   subscribeToAuthStateChangesMock,\r\n   signOutCurrentUserMock,\r\n   unsubscribeMock,\r\n} = vi.hoisted(() => ({\r\n   getCurrentSessionMock: vi.fn(),\r\n   fetchProfileByUserIdMock: vi.fn(),\r\n   subscribeToAuthStateChangesMock: vi.fn(),\r\n   signOutCurrentUserMock: vi.fn(),\r\n   unsubscribeMock: vi.fn(),\r\n}));\r\n\r\nvi.mock(\"../../services/authService\", () => ({\r\n   getCurrentSession: getCurrentSessionMock,\r\n   fetchProfileByUserId: fetchProfileByUserIdMock,\r\n   subscribeToAuthStateChanges: subscribeToAuthStateChangesMock,\r\n   signOutCurrentUser: signOutCurrentUserMock,\r\n}));\r\n\r\nimport { useAuthState } from \"../useAuthState\";\r\n\r\ndescribe(\"useAuthState\", () => {\r\n   beforeEach(() => {\r\n      vi.clearAllMocks();\r\n      subscribeToAuthStateChangesMock.mockReturnValue(unsubscribeMock);\r\n   });\r\n\r\n   it(\"loads session profile on startup\", async () => {\r\n      getCurrentSessionMock.mockResolvedValue({ user: { id: \"u1\" } });\r\n      fetchProfileByUserIdMock.mockResolvedValue({ username: \"joao\", avatar_url: \"avatar.png\" });\r\n\r\n      const { result } = renderHook(() => useAuthState());\r\n\r\n      await waitFor(() => {\r\n         expect(result.current.loading).toBe(false);\r\n         expect(result.current.username).toBe(\"joao\");\r\n         expect(result.current.avatarUrl).toBe(\"avatar.png\");\r\n      });\r\n   });\r\n\r\n   it(\"reacts to auth state changes\", async () => {\r\n      let authListener: ((session: { user: { id: string } } | null) => void) | undefined;\r\n\r\n      getCurrentSessionMock.mockResolvedValue(null);\r\n      fetchProfileByUserIdMock.mockResolvedValue({ username: \"maria\", avatar_url: null });\r\n      subscribeToAuthStateChangesMock.mockImplementation((callback: (session: { user: { id: string } } | null) => void) => {\r\n         authListener = callback;\r\n         return unsubscribeMock;\r\n      });\r\n\r\n      const { result } = renderHook(() => useAuthState());\r\n\r\n      await waitFor(() => {\r\n         expect(result.current.loading).toBe(false);\r\n         expect(result.current.username).toBe(\"\");\r\n      });\r\n\r\n      act(() => {\r\n         authListener?.({ user: { id: \"u2\" } });\r\n      });\r\n\r\n      await waitFor(() => {\r\n         expect(fetchProfileByUserIdMock).toHaveBeenCalledWith(\"u2\");\r\n         expect(result.current.username).toBe(\"maria\");\r\n      });\r\n\r\n      act(() => {\r\n         authListener?.(null);\r\n      });\r\n\r\n      await waitFor(() => {\r\n         expect(result.current.username).toBe(\"\");\r\n         expect(result.current.avatarUrl).toBeNull();\r\n      });\r\n   });\r\n\r\n   it(\"logout delegates to auth service\", async () => {\r\n      getCurrentSessionMock.mockResolvedValue(null);\r\n      signOutCurrentUserMock.mockResolvedValue(undefined);\r\n\r\n      const { result } = renderHook(() => useAuthState());\r\n\r\n      await act(async () => {\r\n         await result.current.logout();\r\n      });\r\n\r\n      expect(signOutCurrentUserMock).toHaveBeenCalled();\r\n   });\r\n});\r\n"},"src/features/lists/hooks/__tests__/useListSocial.test.ts":{"tests":[{"id":"16","name":"useListSocial handleToggleLike returns error when not authenticated"},{"id":"17","name":"useListSocial handleToggleLike updates state optimistically and confirms via service"},{"id":"18","name":"useListSocial handleToggleLike rolls back state on service failure"},{"id":"19","name":"useListSocial handleToggleLike correctly toggles from liked to unliked"},{"id":"20","name":"useListSocial handleShare successfully copies share URL to clipboard"},{"id":"21","name":"useListSocial handleShare returns error when clipboard API fails but includes URL"},{"id":"22","name":"useListSocial handleDuplicate returns error when not authenticated"},{"id":"23","name":"useListSocial handleDuplicate uses provided title and calls clone service"},{"id":"24","name":"useListSocial handleDuplicate accepts custom list type"},{"id":"25","name":"useListSocial handleDuplicate returns error on clone failure"},{"id":"26","name":"useListSocial handleDuplicate ensures isActionLoading is reset to false in finally block"},{"id":"27","name":"useListSocial hook interface returns all expected properties"}],"source":"import { renderHook, act } from \"@testing-library/react\";\r\nimport { beforeEach, describe, expect, it, vi } from \"vitest\";\r\nimport type { DuplicateResult, ShareResult, ToggleLikeResult } from \"../useListSocial\";\r\n\r\nconst {\r\n  toggleListLikeMock,\r\n  cloneListServiceMock,\r\n} = vi.hoisted(() => ({\r\n  toggleListLikeMock: vi.fn(),\r\n  cloneListServiceMock: vi.fn(),\r\n}));\r\n\r\nvi.mock(\"../../services/listSocialService\", () => ({\r\n  toggleListLike: toggleListLikeMock,\r\n  cloneListService: cloneListServiceMock,\r\n}));\r\n\r\nimport { useListSocial } from \"../useListSocial\";\r\n\r\ndescribe(\"useListSocial\", () => {\r\n  beforeEach(() => {\r\n    vi.clearAllMocks();\r\n  });\r\n\r\n  describe(\"handleToggleLike\", () => {\r\n    it(\"returns error when not authenticated\", async () => {\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: undefined,\r\n        })\r\n      );\r\n\r\n      const response = await result.current.handleToggleLike();\r\n\r\n      expect(response.success).toBe(false);\r\n      expect(response.error).toBe(\"Usuário não autenticado.\");\r\n      expect(toggleListLikeMock).not.toHaveBeenCalled();\r\n    });\r\n\r\n    it(\"updates state optimistically and confirms via service\", async () => {\r\n      toggleListLikeMock.mockResolvedValue(undefined);\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      expect(result.current.isLiked).toBe(false);\r\n      expect(result.current.likesCount).toBe(5);\r\n\r\n      let response: ToggleLikeResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleToggleLike();\r\n      });\r\n\r\n      expect(result.current.isLiked).toBe(true);\r\n      expect(result.current.likesCount).toBe(6);\r\n      expect(response?.success).toBe(true);\r\n      expect(toggleListLikeMock).toHaveBeenCalledWith(\"list1\");\r\n    });\r\n\r\n    it(\"rolls back state on service failure\", async () => {\r\n      toggleListLikeMock.mockRejectedValue(new Error(\"Network error\"));\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      let response: ToggleLikeResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleToggleLike();\r\n      });\r\n\r\n      expect(result.current.isLiked).toBe(false);\r\n      expect(result.current.likesCount).toBe(5);\r\n      expect(response?.success).toBe(false);\r\n      expect(response?.error).toBe(\"Erro ao processar curtida.\");\r\n    });\r\n\r\n    it(\"correctly toggles from liked to unliked\", async () => {\r\n      toggleListLikeMock.mockResolvedValue(undefined);\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 10,\r\n          isInitialLiked: true,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      expect(result.current.likesCount).toBe(10);\r\n\r\n      let response: ToggleLikeResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleToggleLike();\r\n      });\r\n\r\n      expect(result.current.isLiked).toBe(false);\r\n      expect(result.current.likesCount).toBe(9);\r\n      expect(response?.success).toBe(true);\r\n    });\r\n  });\r\n\r\n  describe(\"handleShare\", () => {\r\n    it(\"successfully copies share URL to clipboard\", async () => {\r\n      const mockClipboard = vi.fn().mockResolvedValue(undefined);\r\n      Object.assign(navigator, {\r\n        clipboard: { writeText: mockClipboard },\r\n      });\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      let response: ShareResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleShare();\r\n      });\r\n\r\n      const expectedUrl = `${window.location.origin}/perfil/joao?aba=lists&listId=list1`;\r\n\r\n      expect(response?.success).toBe(true);\r\n      expect(response?.url).toBe(expectedUrl);\r\n      expect(mockClipboard).toHaveBeenCalledWith(expectedUrl);\r\n    });\r\n\r\n    it(\"returns error when clipboard API fails but includes URL\", async () => {\r\n      const mockClipboard = vi\r\n        .fn()\r\n        .mockRejectedValue(new Error(\"Clipboard denied\"));\r\n      Object.assign(navigator, {\r\n        clipboard: { writeText: mockClipboard },\r\n      });\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      let response: ShareResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleShare();\r\n      });\r\n\r\n      const expectedUrl = `${window.location.origin}/perfil/joao?aba=lists&listId=list1`;\r\n\r\n      expect(response?.success).toBe(false);\r\n      expect(response?.url).toBe(expectedUrl);\r\n      expect(response?.error).toBe(\"Erro ao compartilhar lista.\");\r\n    });\r\n  });\r\n\r\n  describe(\"handleDuplicate\", () => {\r\n    it(\"returns error when not authenticated\", async () => {\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: undefined,\r\n        })\r\n      );\r\n\r\n      let response: DuplicateResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleDuplicate(\"My List\");\r\n      });\r\n\r\n      expect(response?.success).toBe(false);\r\n      expect(response?.error).toBe(\"Usuário não autenticado.\");\r\n      expect(cloneListServiceMock).not.toHaveBeenCalled();\r\n    });\r\n\r\n    it(\"uses provided title and calls clone service\", async () => {\r\n      const mockNewList = { id: \"list2\", owner_id: \"user1\", name: \"My List (Cópia)\" };\r\n      cloneListServiceMock.mockResolvedValue(mockNewList);\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      let response: DuplicateResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleDuplicate(\"My List\");\r\n      });\r\n\r\n      expect(response?.success).toBe(true);\r\n      expect(response?.data).toEqual(mockNewList);\r\n      expect(cloneListServiceMock).toHaveBeenCalledWith(\r\n        \"list1\",\r\n        \"user1\",\r\n        \"My List\",\r\n        \"private\",\r\n        undefined\r\n      );\r\n    });\r\n\r\n    it(\"accepts custom list type\", async () => {\r\n      const mockNewList = { id: \"list2\", owner_id: \"user1\", name: \"My List (Cópia)\" };\r\n      cloneListServiceMock.mockResolvedValue(mockNewList);\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      let response: DuplicateResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleDuplicate(\"My List\", \"partial_shared\");\r\n      });\r\n\r\n      expect(cloneListServiceMock).toHaveBeenCalledWith(\r\n        \"list1\",\r\n        \"user1\",\r\n        \"My List\",\r\n        \"partial_shared\",\r\n        undefined\r\n      );\r\n      expect(response?.success).toBe(true);\r\n    });\r\n\r\n    it(\"returns error on clone failure\", async () => {\r\n      cloneListServiceMock.mockRejectedValue(new Error(\"Clone failed\"));\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      let response: DuplicateResult | undefined;\r\n      await act(async () => {\r\n        response = await result.current.handleDuplicate(\"My List\");\r\n      });\r\n\r\n      expect(response?.success).toBe(false);\r\n      expect(response?.data).toBeNull();\r\n      expect(response?.error).toBe(\"Erro ao duplicar a lista.\");\r\n    });\r\n\r\n    it(\"ensures isActionLoading is reset to false in finally block\", async () => {\r\n      cloneListServiceMock.mockRejectedValue(new Error(\"Clone failed\"));\r\n\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      expect(result.current.isActionLoading).toBe(false);\r\n\r\n      await act(async () => {\r\n        await result.current.handleDuplicate(\"My List\");\r\n      });\r\n\r\n      expect(result.current.isActionLoading).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe(\"hook interface\", () => {\r\n    it(\"returns all expected properties\", () => {\r\n      const { result } = renderHook(() =>\r\n        useListSocial({\r\n          listId: \"list1\",\r\n          initialLikes: 5,\r\n          isInitialLiked: false,\r\n          ownerUsername: \"joao\",\r\n          currentUserId: \"user1\",\r\n        })\r\n      );\r\n\r\n      expect(result.current).toHaveProperty(\"isLiked\");\r\n      expect(result.current).toHaveProperty(\"likesCount\");\r\n      expect(result.current).toHaveProperty(\"isActionLoading\");\r\n      expect(result.current).toHaveProperty(\"handleToggleLike\");\r\n      expect(result.current).toHaveProperty(\"handleShare\");\r\n      expect(result.current).toHaveProperty(\"handleDuplicate\");\r\n    });\r\n  });\r\n});\r\n"},"src/features/battle/logic/__tests__/battleOperations.test.ts":{"tests":[{"id":"28","name":"shuffleArray [M1-A] deve chamar Math.random exatamente (length - 1) vezes"},{"id":"29","name":"shuffleArray [M1-D/F] deve permitir que qualquer posição troque com ela mesma (j pode = i)"},{"id":"30","name":"shuffleArray [M1-G] deve reposicionar elementos quando Math.random produz j diferente de i"},{"id":"31","name":"shuffleArray não deve modificar o array original"},{"id":"32","name":"shuffleArray deve retornar array com os mesmos elementos sem duplicatas"},{"id":"33","name":"shuffleArray deve retornar array vazio se receber array vazio"},{"id":"34","name":"shuffleArray deve retornar array de um elemento sem modificação"},{"id":"35","name":"nextPowerOfTwo [M2-A] deve retornar 0 para n=0 (guarda n <"+"= 0 cobre o zero)"},{"id":"36","name":"nextPowerOfTwo [M2-B] deve retornar 0 para qualquer n negativo"},{"id":"37","name":"nextPowerOfTwo [M2-C/D] deve retornar valor > 0 para qualquer n positivo"},{"id":"38","name":"nextPowerOfTwo [M2-E] deve retornar exatamente 0 (não 1) para n <"+"= 0"},{"id":"39","name":"nextPowerOfTwo [M2-F] deve retornar o próprio n quando ele já é potência de 2"},{"id":"40","name":"nextPowerOfTwo [M2-F/G/H] deve arredondar para a próxima potência de 2 acima"},{"id":"41","name":"nextPowerOfTwo [M2-H] deve funcionar corretamente com log2 (não log natural)"},{"id":"42","name":"filterMoviesByCriteria [M3-A] não deve incluir filmes com status 'watchlist'"},{"id":"43","name":"filterMoviesByCriteria [M3-C] não deve incluir filmes watched com rating null"},{"id":"44","name":"filterMoviesByCriteria [M3-E] deve incluir apenas filmes que são watched E têm rating (não basta um)"},{"id":"45","name":"filterMoviesByCriteria [M3-B/D] deve incluir todos os filmes watched com rating"},{"id":"46","name":"filterMoviesByCriteria [M3-F] critério 'oscar' deve retornar apenas filmes com isOscar=true"},{"id":"47","name":"filterMoviesByCriteria [M3-F] critério 'national' deve retornar apenas filmes com isNational=true"},{"id":"48","name":"filterMoviesByCriteria critérios 'oscar' e 'national' devem retornar conjuntos distintos"},{"id":"49","name":"setupTournament — guarda de mínimo [M4-A] não deve lançar erro com exatamente 2 filmes"},{"id":"50","name":"setupTournament — guarda de mínimo [M4-B] deve lançar erro com 1 filme"},{"id":"51","name":"setupTournament — guarda de mínimo [M4-B] deve lançar erro com 0 filmes"},{"id":"52","name":"setupTournament — guarda de mínimo [M4-C] não deve lançar erro com 3 ou mais filmes"},{"id":"53","name":"setupTournament — lógica de quantity [M5-A/B/C] quantity=-1 deve selecionar todos os filmes disponíveis"},{"id":"54","name":"setupTournament — lógica de quantity [M5-A] quantity positivo deve limitar a seleção, não usar todos"},{"id":"55","name":"setupTournament — lógica de quantity [M5-D] não deve selecionar mais filmes que o total disponível (Math.min)"},{"id":"56","name":"setupTournament — lógica de quantity [M5-D] quantity menor que o total deve limitar corretamente"},{"id":"57","name":"setupTournament — ordenação [M6-A/B] top_rated deve selecionar os filmes de maior rating"},{"id":"58","name":"setupTournament — ordenação [M6-C] worst_rated deve selecionar os filmes de menor rating"},{"id":"59","name":"setupTournament — ordenação [M6-A/C] top_rated e worst_rated devem selecionar conjuntos opostos"},{"id":"60","name":"setupTournament — ordenação [M6-D] recent deve selecionar os filmes com maior id"},{"id":"61","name":"setupTournament — ordenação [M6-D] recent não deve incluir o filme mais antigo quando quantity <"+" total"},{"id":"62","name":"setupTournament — cálculo de bracket, fighters e byes [M7-A/B] torneio perfeito (8 filmes) deve ter 8 fighters e 0 byes"},{"id":"63","name":"setupTournament — cálculo de bracket, fighters e byes [M7-A/B] 5 filmes → bracketSize=8, 2 fighters, 3 byes"},{"id":"64","name":"setupTournament — cálculo de bracket, fighters e byes [M7-A/B] 3 filmes → bracketSize=4, 2 fighters, 1 bye"},{"id":"65","name":"setupTournament — cálculo de bracket, fighters e byes [M7-C/D] fighters e byes não devem conter os mesmos filmes"},{"id":"66","name":"setupTournament — cálculo de bracket, fighters e byes [M7-C/D] fighters + byes devem cobrir todos os participantes sem perda"},{"id":"67","name":"setupTournament — cálculo de bracket, fighters e byes fighters + byes deve igualar o número de participantes selecionados"},{"id":"68","name":"setupTournament — embaralhamento final [M8-A/C] critérios não-random devem produzir fighters e byes corretos"},{"id":"69","name":"setupTournament — embaralhamento final [M8-B] critério random deve produzir fighters e byes corretos"},{"id":"70","name":"setupTournament — embaralhamento final [M8-A] após embaralhamento, byes e fighters são subconjuntos dos participantes"}],"source":"import { describe, it, expect, vi } from \"vitest\";\r\nimport { shuffleArray, filterMoviesByCriteria, setupTournament, nextPowerOfTwo } from \"../battleOperations\";\r\nimport type { MovieData } from \"@/types\";\r\n\r\nfunction makeMovies(\r\n   ratings: (number | null)[],\r\n   extras: Partial<"+"MovieData> = {}\r\n): MovieData[] {\r\n   return ratings.map(\r\n      (rating, i) =>\r\n         ({\r\n            id: i,\r\n            title: `Filme ${i}`,\r\n            status: \"watched\",\r\n            isOscar: false,\r\n            isNational: false,\r\n            rating,\r\n            ...extras,\r\n         } as MovieData)\r\n   );\r\n}\r\n\r\nfunction allParticipants(result: { fighters: MovieData[]; byes: MovieData[] }) {\r\n   return [...result.fighters, ...result.byes];\r\n}\r\n\r\ndescribe(\"shuffleArray\", () => {\r\n   // M1-A: conta chamadas do Math.random — com i >= 0 seriam length chamadas, não length-1\r\n   it(\"[M1-A] deve chamar Math.random exatamente (length - 1) vezes\", () => {\r\n      const spy = vi.spyOn(Math, \"random\").mockReturnValue(0.5);\r\n      shuffleArray([1, 2, 3, 4]); \r\n      expect(spy).toHaveBeenCalledTimes(3);\r\n      spy.mockRestore();\r\n   });\r\n\r\n   // M1-D / M1-F: verifica que j pode assumir valores iguais a i (sem i+1, não consegue)\r\n   it(\"[M1-D/F] deve permitir que qualquer posição troque com ela mesma (j pode = i)\", () => {\r\n      // Math.random() → 0.99... → j = floor(0.99 * (i+1)) = i quando possível\r\n      const spy = vi.spyOn(Math, \"random\").mockReturnValue(0.9999);\r\n      const result = shuffleArray([10, 20, 30]);\r\n      // Com i+1 correto e random≈1: j=i em todas as iterações → array inalterado\r\n      expect(result).toEqual([10, 20, 30]);\r\n      spy.mockRestore();\r\n   });\r\n\r\n   // M1-G: garante que a troca de posição realmente ocorre\r\n   it(\"[M1-G] deve reposicionar elementos quando Math.random produz j diferente de i\", () => {\r\n      // i=1, random=0 → j=0: espera troca entre índices 0 e 1\r\n      const spy = vi.spyOn(Math, \"random\").mockReturnValue(0);\r\n      // Array [A, B, C]: i=2 j=0→swap(2,0)=[C,B,A]; i=1 j=0→swap(1,0)=[B,C,A]\r\n      const result = shuffleArray([\"A\", \"B\", \"C\"]);\r\n      expect(result).toEqual([\"B\", \"C\", \"A\"]);\r\n      spy.mockRestore();\r\n   });\r\n\r\n   // Sanidade: não modifica original e mantém todos os elementos\r\n   it(\"não deve modificar o array original\", () => {\r\n      const original = [1, 2, 3, 4, 5];\r\n      const copy = [...original];\r\n      shuffleArray(original);\r\n      expect(original).toEqual(copy);\r\n   });\r\n\r\n   it(\"deve retornar array com os mesmos elementos sem duplicatas\", () => {\r\n      const original = [10, 20, 30, 40, 50];\r\n      const result = shuffleArray(original);\r\n      expect(result.sort()).toEqual([...original].sort());\r\n   });\r\n\r\n   it(\"deve retornar array vazio se receber array vazio\", () => {\r\n      expect(shuffleArray([])).toEqual([]);\r\n   });\r\n\r\n   it(\"deve retornar array de um elemento sem modificação\", () => {\r\n      expect(shuffleArray([42])).toEqual([42]);\r\n   });\r\n});\r\n\r\ndescribe(\"nextPowerOfTwo\", () => {\r\n   // M2-A: n=0 deve retornar 0, não tentar log2(0) = -Infinity\r\n   it(\"[M2-A] deve retornar 0 para n=0 (guarda n <"+"= 0 cobre o zero)\", () => {\r\n      expect(nextPowerOfTwo(0)).toBe(0);\r\n   });\r\n\r\n   // M2-B: negativos devem retornar 0\r\n   it(\"[M2-B] deve retornar 0 para qualquer n negativo\", () => {\r\n      expect(nextPowerOfTwo(-1)).toBe(0);\r\n      expect(nextPowerOfTwo(-100)).toBe(0);\r\n   });\r\n\r\n   // M2-C/D: valores positivos nunca devem retornar 0\r\n   it(\"[M2-C/D] deve retornar valor > 0 para qualquer n positivo\", () => {\r\n      expect(nextPowerOfTwo(1)).toBeGreaterThan(0);\r\n      expect(nextPowerOfTwo(7)).toBeGreaterThan(0);\r\n   });\r\n\r\n   // M2-E: retorno do sad path é exatamente 0, não 1\r\n   it(\"[M2-E] deve retornar exatamente 0 (não 1) para n <"+"= 0\", () => {\r\n      expect(nextPowerOfTwo(0)).toBe(0);\r\n      expect(nextPowerOfTwo(-5)).toBe(0);\r\n   });\r\n\r\n   // M2-F: Math.ceil vs Math.floor — n que já é potência de 2 deve retornar ele mesmo\r\n   it(\"[M2-F] deve retornar o próprio n quando ele já é potência de 2\", () => {\r\n      expect(nextPowerOfTwo(1)).toBe(1);\r\n      expect(nextPowerOfTwo(2)).toBe(2);\r\n      expect(nextPowerOfTwo(4)).toBe(4);\r\n      expect(nextPowerOfTwo(8)).toBe(8);\r\n      expect(nextPowerOfTwo(16)).toBe(16);\r\n   });\r\n\r\n   // M2-F/G/H: n não-potência deve arredondar para CIMA, não para baixo nem errar\r\n   it(\"[M2-F/G/H] deve arredondar para a próxima potência de 2 acima\", () => {\r\n      expect(nextPowerOfTwo(3)).toBe(4); \r\n      expect(nextPowerOfTwo(5)).toBe(8);\r\n      expect(nextPowerOfTwo(6)).toBe(8);\r\n      expect(nextPowerOfTwo(7)).toBe(8);  \r\n      expect(nextPowerOfTwo(9)).toBe(16);  \r\n      expect(nextPowerOfTwo(12)).toBe(16);\r\n      expect(nextPowerOfTwo(100)).toBe(128);\r\n   });\r\n\r\n   // M2-H: log2 vs log — log2(8)=3, log(8)≈2.08; resultados diferentes\r\n   it(\"[M2-H] deve funcionar corretamente com log2 (não log natural)\", () => {\r\n      expect(nextPowerOfTwo(32)).toBe(32);\r\n      expect(nextPowerOfTwo(33)).toBe(64);\r\n   });\r\n});\r\n\r\n\r\ndescribe(\"filterMoviesByCriteria\", () => {\r\n   const movies: MovieData[] = [\r\n      { id: 1, title: \"Watched+Rating+Oscar\",    status: \"watched\",   isOscar: true,  isNational: false, rating: 8 },\r\n      { id: 2, title: \"Watched+Rating+National\", status: \"watched\",   isOscar: false, isNational: true,  rating: 6 },\r\n      { id: 3, title: \"Watched+Rating+None\",     status: \"watched\",   isOscar: false, isNational: false, rating: 7 },\r\n      { id: 4, title: \"Watched+NoRating\",        status: \"watched\",   isOscar: true,  isNational: true,  rating: null },\r\n      { id: 5, title: \"Watchlist+Rating\",        status: \"watchlist\", isOscar: true,  isNational: true,  rating: 9 },\r\n      { id: 6, title: \"Watchlist+NoRating\",      status: \"watchlist\", isOscar: false, isNational: false, rating: null },\r\n   ] as MovieData[];\r\n\r\n   it(\"[M3-A] não deve incluir filmes com status 'watchlist'\", () => {\r\n      const result = filterMoviesByCriteria(movies, \"random\");\r\n      const ids = result.map((m) => m.id);\r\n      expect(ids).not.toContain(5); \r\n      expect(ids).not.toContain(6); \r\n   });\r\n\r\n   it(\"[M3-C] não deve incluir filmes watched com rating null\", () => {\r\n      const result = filterMoviesByCriteria(movies, \"random\");\r\n      const ids = result.map((m) => m.id);\r\n      expect(ids).not.toContain(4); \r\n   });\r\n\r\n   it(\"[M3-E] deve incluir apenas filmes que são watched E têm rating (não basta um)\", () => {\r\n      const result = filterMoviesByCriteria(movies, \"random\");\r\n      expect(result.every((m) => m.status === \"watched\" && m.rating !== null)).toBe(true);\r\n   });\r\n\r\n   it(\"[M3-B/D] deve incluir todos os filmes watched com rating\", () => {\r\n      const result = filterMoviesByCriteria(movies, \"random\");\r\n      const ids = result.map((m) => m.id);\r\n      expect(ids).toContain(1);\r\n      expect(ids).toContain(2);\r\n      expect(ids).toContain(3);\r\n      expect(result).toHaveLength(3);\r\n   });\r\n\r\n   it(\"[M3-F] critério 'oscar' deve retornar apenas filmes com isOscar=true\", () => {\r\n      const result = filterMoviesByCriteria(movies, \"oscar\");\r\n      expect(result).toHaveLength(1);\r\n      expect(result[0].id).toBe(1);\r\n      expect(result.every((m) => m.isOscar === true)).toBe(true);\r\n   });\r\n\r\n   it(\"[M3-F] critério 'national' deve retornar apenas filmes com isNational=true\", () => {\r\n      const result = filterMoviesByCriteria(movies, \"national\");\r\n      expect(result).toHaveLength(1);\r\n      expect(result[0].id).toBe(2);\r\n      expect(result.every((m) => m.isNational === true)).toBe(true);\r\n   });\r\n\r\n   it(\"critérios 'oscar' e 'national' devem retornar conjuntos distintos\", () => {\r\n      const oscar = filterMoviesByCriteria(movies, \"oscar\").map((m) => m.id);\r\n      const national = filterMoviesByCriteria(movies, \"national\").map((m) => m.id);\r\n      expect(oscar).not.toEqual(national);\r\n   });\r\n});\r\n\r\ndescribe(\"setupTournament — guarda de mínimo\", () => {\r\n   it(\"[M4-A] não deve lançar erro com exatamente 2 filmes\", () => {\r\n      const movies = makeMovies([5, 7]);\r\n      expect(() => setupTournament(movies, \"random\", 2)).not.toThrow();\r\n   });\r\n\r\n   it(\"[M4-B] deve lançar erro com 1 filme\", () => {\r\n      const movies = makeMovies([5]);\r\n      expect(() => setupTournament(movies, \"random\", 2)).toThrowError(\"Mínimo de 2 filmes necessários\");\r\n   });\r\n\r\n   it(\"[M4-B] deve lançar erro com 0 filmes\", () => {\r\n      expect(() => setupTournament([], \"random\", 2)).toThrowError(\"Mínimo de 2 filmes necessários\");\r\n   });\r\n\r\n   it(\"[M4-C] não deve lançar erro com 3 ou mais filmes\", () => {\r\n      const movies = makeMovies([1, 2, 3]);\r\n      expect(() => setupTournament(movies, \"random\", 3)).not.toThrow();\r\n   });\r\n});\r\n\r\ndescribe(\"setupTournament — lógica de quantity\", () => {\r\n   it(\"[M5-A/B/C] quantity=-1 deve selecionar todos os filmes disponíveis\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5, 6]);\r\n      const result = setupTournament(movies, \"random\", -1);\r\n      const total = allParticipants(result).length;\r\n      expect(total).toBe(6);\r\n   });\r\n\r\n   it(\"[M5-A] quantity positivo deve limitar a seleção, não usar todos\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5, 6]);\r\n      const result = setupTournament(movies, \"random\", 4);\r\n      const total = allParticipants(result).length;\r\n      expect(total).toBe(4);\r\n   });\r\n\r\n\r\n   it(\"[M5-D] não deve selecionar mais filmes que o total disponível (Math.min)\", () => {\r\n      const movies = makeMovies([1, 2, 3]); \r\n      const result = setupTournament(movies, \"random\", 10); \r\n      const total = allParticipants(result).length;\r\n      expect(total).toBe(3); \r\n   });\r\n\r\n   it(\"[M5-D] quantity menor que o total deve limitar corretamente\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5]);\r\n      const result = setupTournament(movies, \"random\", 3);\r\n      expect(allParticipants(result)).toHaveLength(3);\r\n   });\r\n});\r\n\r\ndescribe(\"setupTournament — ordenação\", () => {\r\n   it(\"[M6-A/B] top_rated deve selecionar os filmes de maior rating\", () => {\r\n      const movies = makeMovies([1, 3, 5, 7, 9]);\r\n      const result = setupTournament(movies, \"top_rated\", 3);\r\n      const ratings = allParticipants(result).map((m) => m.rating);\r\n      expect(ratings).toContain(9);\r\n      expect(ratings).toContain(7);\r\n      expect(ratings).toContain(5);\r\n      expect(ratings).not.toContain(1);\r\n      expect(ratings).not.toContain(3);\r\n   });\r\n\r\n   it(\"[M6-C] worst_rated deve selecionar os filmes de menor rating\", () => {\r\n      const movies = makeMovies([1, 3, 5, 7, 9]);\r\n      const result = setupTournament(movies, \"worst_rated\", 3);\r\n      const ratings = allParticipants(result).map((m) => m.rating);\r\n      expect(ratings).toContain(1);\r\n      expect(ratings).toContain(3);\r\n      expect(ratings).toContain(5);\r\n      expect(ratings).not.toContain(7);\r\n      expect(ratings).not.toContain(9);\r\n   });\r\n\r\n   it(\"[M6-A/C] top_rated e worst_rated devem selecionar conjuntos opostos\", () => {\r\n      const movies = makeMovies([2, 4, 6, 8]);\r\n      const top = allParticipants(setupTournament(movies, \"top_rated\", 2)).map((m) => m.rating).sort();\r\n      const worst = allParticipants(setupTournament(movies, \"worst_rated\", 2)).map((m) => m.rating).sort();\r\n      expect(top).toEqual([6, 8]);\r\n      expect(worst).toEqual([2, 4]);\r\n   });\r\n\r\n   it(\"[M6-D] recent deve selecionar os filmes com maior id\", () => {\r\n      const movies = makeMovies([5, 5, 5, 5, 5]); \r\n      const result = setupTournament(movies, \"recent\", 2);\r\n      const ids = allParticipants(result).map((m) => m.id);\r\n      expect(ids).toContain(4);\r\n      expect(ids).toContain(3);\r\n      expect(ids).not.toContain(0);\r\n   });\r\n\r\n   it(\"[M6-D] recent não deve incluir o filme mais antigo quando quantity <"+" total\", () => {\r\n      const movies = makeMovies([5, 5, 5, 5, 5]);\r\n      const result = setupTournament(movies, \"recent\", 4);\r\n      const ids = allParticipants(result).map((m) => m.id);\r\n      expect(ids).not.toContain(0);\r\n   });\r\n});\r\n\r\ndescribe(\"setupTournament — cálculo de bracket, fighters e byes\", () => {\r\n   it(\"[M7-A/B] torneio perfeito (8 filmes) deve ter 8 fighters e 0 byes\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5, 6, 7, 8]);\r\n      const { fighters, byes, bracketSize } = setupTournament(movies, \"random\", 8);\r\n      expect(bracketSize).toBe(8);\r\n      expect(fighters).toHaveLength(8);\r\n      expect(byes).toHaveLength(0);\r\n   });\r\n\r\n\r\n   it(\"[M7-A/B] 5 filmes → bracketSize=8, 2 fighters, 3 byes\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5]);\r\n      const { fighters, byes, bracketSize } = setupTournament(movies, \"random\", 5);\r\n      expect(bracketSize).toBe(8);\r\n      expect(fighters).toHaveLength(2);\r\n      expect(byes).toHaveLength(3);\r\n   });\r\n\r\n   it(\"[M7-A/B] 3 filmes → bracketSize=4, 2 fighters, 1 bye\", () => {\r\n      const movies = makeMovies([1, 2, 3]);\r\n      const { fighters, byes, bracketSize } = setupTournament(movies, \"random\", 3);\r\n      expect(bracketSize).toBe(4);\r\n      expect(fighters).toHaveLength(2);\r\n      expect(byes).toHaveLength(1);\r\n   });\r\n\r\n   it(\"[M7-C/D] fighters e byes não devem conter os mesmos filmes\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5]);\r\n      const { fighters, byes } = setupTournament(movies, \"random\", 5);\r\n      const fighterIds = new Set(fighters.map((m) => m.id));\r\n      const byeIds = byes.map((m) => m.id);\r\n      expect(byeIds.every((id) => !fighterIds.has(id))).toBe(true);\r\n   });\r\n\r\n   it(\"[M7-C/D] fighters + byes devem cobrir todos os participantes sem perda\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5]);\r\n      const { fighters, byes } = setupTournament(movies, \"random\", 5);\r\n      expect(fighters.length + byes.length).toBe(5);\r\n   });\r\n\r\n   it(\"fighters + byes deve igualar o número de participantes selecionados\", () => {\r\n      for (const qty of [2, 3, 4, 5, 6, 7, 8]) {\r\n         const movies = makeMovies(Array.from({ length: qty }, (_, i) => i + 1));\r\n         const { fighters, byes } = setupTournament(movies, \"random\", qty);\r\n         expect(fighters.length + byes.length).toBe(qty);\r\n      }\r\n   });\r\n});\r\n\r\ndescribe(\"setupTournament — embaralhamento final\", () => {\r\n   it(\"[M8-A/C] critérios não-random devem produzir fighters e byes corretos\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5]);\r\n      for (const criteria of [\"top_rated\", \"worst_rated\", \"recent\"] as const) {\r\n         const { fighters, byes } = setupTournament(movies, criteria, 5);\r\n         expect(fighters.length + byes.length).toBe(5);\r\n         expect(fighters).toHaveLength(2);\r\n         expect(byes).toHaveLength(3);\r\n      }\r\n   });\r\n\r\n   it(\"[M8-B] critério random deve produzir fighters e byes corretos\", () => {\r\n      const movies = makeMovies([1, 2, 3, 4, 5]);\r\n      const { fighters, byes } = setupTournament(movies, \"random\", 5);\r\n      expect(fighters.length + byes.length).toBe(5);\r\n   });\r\n   \r\n   it(\"[M8-A] após embaralhamento, byes e fighters são subconjuntos dos participantes\", () => {\r\n      const movies = makeMovies([1, 3, 5, 7, 9]);\r\n      const { fighters, byes } = setupTournament(movies, \"top_rated\", 4);\r\n      const participantIds = new Set(allParticipants({ fighters, byes }).map((m) => m.id));\r\n      const allIds = new Set(movies.map((m) => m.id));\r\n      participantIds.forEach((id) => expect(allIds.has(id)).toBe(true));\r\n   });\r\n});"},"src/features/movies/logic/__tests__/sortMovies.test.ts":{"tests":[{"id":"71","name":"sortMovies (Functional Core) deve ordenar os filmes por nota (rating) de forma decrescente"},{"id":"72","name":"sortMovies (Functional Core) deve manter a ordem (ou desempatar corretamente) quando os valores são iguais"},{"id":"73","name":"sortMovies (Functional Core) deve ordenar os filmes alfabeticamente (alpha)"},{"id":"74","name":"sortMovies (Functional Core) deve retornar o array intacto se a ordem for 'default' (id decrescente)"},{"id":"75","name":"Tratamento de Falhas deve jogar os filmes sem data de lançamento para o final da lista (Ordenação por Data)"},{"id":"76","name":"Tratamento de Falhas deve jogar os filmes sem nota para o final da lista (Ordenação por Rating)"},{"id":"77","name":"Tratamento de Falhas deve retornar o array intacto se receber uma ordem de ordenação inválida"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { sortMovies } from \"../sortMovies\";\r\nimport type { MovieData } from \"@/types\";\r\n\r\n// Factory para criar filmes falsos\r\n// Usa \"as MovieData\" para não precisar preencher todos os campos obrigatórios do tipo\r\nconst makeMovie = (overrides: Partial<"+"MovieData> = {}): MovieData => ({\r\n   id: 1,\r\n   tmdb_id: 100,\r\n   title: \"Filme Padrão\",\r\n   status: \"watched\",\r\n   ...overrides,\r\n} as MovieData);\r\n\r\ndescribe(\"sortMovies (Functional Core)\", () => {\r\n   \r\n   it(\"deve ordenar os filmes por nota (rating) de forma decrescente\", () => {\r\n      // Preparação\r\n      const movies = [\r\n         makeMovie({ id: 1, rating: 5 }),\r\n         makeMovie({ id: 2, rating: 9 }),\r\n         makeMovie({ id: 3, rating: 7 }),\r\n      ];\r\n\r\n      // Ação \r\n      const result = sortMovies(movies, \"rating\");\r\n\r\n      // Verificação\r\n      expect(result.map(m => m.rating)).toEqual([9, 7, 5]);\r\n   });\r\n\r\n   it(\"deve manter a ordem (ou desempatar corretamente) quando os valores são iguais\", () => {\r\n      const movies = [\r\n         { id: 1, title: \"Filme A\", rating: 8 },\r\n         { id: 2, title: \"Filme B\", rating: 8 }\r\n      ] as MovieData[];\r\n      \r\n      const sorted = sortMovies(movies, \"rating\");\r\n      expect(sorted.length).toBe(2);\r\n   });\r\n\r\n   it(\"deve ordenar os filmes alfabeticamente (alpha)\", () => {\r\n      const movies = [\r\n         makeMovie({ title: \"Zombieland\" }),\r\n         makeMovie({ title: \"Avatar\" }),\r\n         makeMovie({ title: \"Matrix\" })\r\n      ];\r\n      \r\n      const result = sortMovies(movies, \"alpha\");\r\n      \r\n      expect(result.map(m => m.title)).toEqual([\"Avatar\", \"Matrix\", \"Zombieland\"]);\r\n   });\r\n\r\n   it(\"deve retornar o array intacto se a ordem for 'default' (id decrescente)\", () => {\r\n      const movies = [\r\n         makeMovie({ id: 10 }),\r\n         makeMovie({ id: 20 }),\r\n         makeMovie({ id: 5 })\r\n      ];\r\n      \r\n      const result = sortMovies(movies, \"default\");\r\n      \r\n      expect(result.map(m => m.id)).toEqual([20, 10, 5]);\r\n   });\r\n\r\n});\r\n\r\ndescribe(\"Tratamento de Falhas\", () => {\r\n   it(\"deve jogar os filmes sem data de lançamento para o final da lista (Ordenação por Data)\", () => {\r\n      const movies: MovieData[] = [\r\n         { id: 1, title: \"Sem Data\", release_date: undefined } as MovieData,\r\n         { id: 2, title: \"Com Data\", release_date: \"2023-01-01\" } as MovieData,\r\n      ];\r\n\r\n      const result = sortMovies(movies, \"date\");\r\n      \r\n      // O filme COM data tem de vir primeiro, o lixo/vazio vai para o final\r\n      expect(result[0].title).toBe(\"Com Data\");\r\n      expect(result[1].title).toBe(\"Sem Data\");\r\n   });\r\n\r\n   it(\"deve jogar os filmes sem nota para o final da lista (Ordenação por Rating)\", () => {\r\n      const movies: MovieData[] = [\r\n         { id: 1, title: \"Sem Nota\", rating: null } as MovieData,\r\n         { id: 2, title: \"Com Nota Baixa\", rating: 2 } as MovieData,\r\n         { id: 3, title: \"Com Nota Alta\", rating: 9 } as MovieData,\r\n      ];\r\n\r\n      const result = sortMovies(movies, \"rating\");\r\n      \r\n      // A ordem esperada é: Maior nota -> Menor nota -> Sem nota\r\n      expect(result[0].title).toBe(\"Com Nota Alta\");\r\n      expect(result[2].title).toBe(\"Sem Nota\");\r\n   });\r\n\r\n   it(\"deve retornar o array intacto se receber uma ordem de ordenação inválida\", () => {\r\n      const movies: MovieData[] = [{ id: 1, title: \"A\" } as MovieData];\r\n      \r\n      // @ts-expect-error: Injetando um sortOrder que não existe na tipagem\r\n      const result = sortMovies(movies, \"ordem_maluca\");\r\n      \r\n      expect(result).toEqual(movies);\r\n   });\r\n});"},"src/features/games/components/GamesHub/logic/__tests__/dailyMovieGameLogic.test.ts":{"tests":[{"id":"78","name":"dailyMovieGameLogic expoe constantes esperadas"},{"id":"79","name":"dailyMovieGameLogic gera seed deterministica e sensivel a entrada"},{"id":"80","name":"dailyMovieGameLogic getTodayKey retorna formato YYYY-MM-DD"},{"id":"81","name":"dailyMovieGameLogic formatTodayKeyDDMMYYYY converte para DD/MM/YYYY e preserva valor invalido"},{"id":"82","name":"dailyMovieGameLogic normalizeText remove acentos e espacos extras"},{"id":"83","name":"dailyMovieGameLogic toMovieProfileFromApp converte e aplica defaults"},{"id":"84","name":"dailyMovieGameLogic toMovieProfileFromTmdb converte crew, cast e campos opcionais"},{"id":"85","name":"dailyMovieGameLogic toMovieProfileFromApp aplica fallbacks quando campos opcionais estao ausentes"},{"id":"86","name":"dailyMovieGameLogic toMovieProfileFromTmdb lida com credits e campos vazios"},{"id":"87","name":"dailyMovieGameLogic pickDeterministicMovie retorna null para pool vazio e item por seed"},{"id":"88","name":"dailyMovieGameLogic parseYear with short date returns undefined"},{"id":"89","name":"dailyMovieGameLogic toMovieProfileFromApp with minimal cast array"},{"id":"90","name":"dailyMovieGameLogic toMovieProfileFromTmdb with empty credits array"},{"id":"91","name":"dailyMovieGameLogic toMovieProfileFromTmdb with missing credentials object"},{"id":"92","name":"dailyMovieGameLogic toMovieProfileFromTmdb with undefined credits"},{"id":"93","name":"dailyMovieGameLogic getListLabel with empty array returns Nao informado"},{"id":"94","name":"dailyMovieGameLogic parseYear handles string length exactly 4"},{"id":"95","name":"dailyMovieGameLogic toMovieProfileFromApp with single cast member"},{"id":"96","name":"dailyMovieGameLogic toMovieProfileFromApp with 6 cast members returns only 5"},{"id":"97","name":"dailyMovieGameLogic toMovieProfileFromTmdb with crew array has Array.isArray true condition"},{"id":"98","name":"dailyMovieGameLogic toMovieProfileFromTmdb crew with no director still filters"},{"id":"99","name":"dailyMovieGameLogic toMovieProfileFromTmdb cast map and filter chain"},{"id":"100","name":"dailyMovieGameLogic getListLabel monta texto ou fallback"}],"source":"import { describe, expect, it, vi } from \"vitest\";\r\nimport type { MovieData } from \"@/types\";\r\nimport {\r\n  GLOBAL_DAILY_TMDB_IDS,\r\n  MAX_LIVES,\r\n  buildDailySeed,\r\n  formatTodayKeyDDMMYYYY,\r\n  getListLabel,\r\n  getTodayKey,\r\n  normalizeText,\r\n  pickDeterministicMovie,\r\n  toMovieProfileFromApp,\r\n  toMovieProfileFromTmdb,\r\n} from \"../dailyMovieGameLogic\";\r\n\r\nfunction makeMovie(overrides: Partial<"+"MovieData> = {}): MovieData {\r\n  return {\r\n    id: 1,\r\n    tmdb_id: 550,\r\n    rating: 4,\r\n    review: \"x\",\r\n    recommended: \"yes\",\r\n    created_at: \"2026-01-01\",\r\n    title: \"Cidade de Deus\",\r\n    release_date: \"2002-08-31\",\r\n    director: \"Fernando Meirelles\",\r\n    countries: [\"United States\", \"Brazil\"],\r\n    cast: [\"A\", \"B\", \"C\", \"D\", \"E\", \"F\"],\r\n    genres: [\"Crime\", \"Drama\"],\r\n    runtime: 130,\r\n    poster_path: \"/poster.jpg\",\r\n    ...overrides,\r\n  };\r\n}\r\n\r\ndescribe(\"dailyMovieGameLogic\", () => {\r\n  it(\"expoe constantes esperadas\", () => {\r\n    expect(MAX_LIVES).toBe(6);\r\n    expect(GLOBAL_DAILY_TMDB_IDS.length).toBeGreaterThan(0);\r\n  });\r\n\r\n  it(\"gera seed deterministica e sensivel a entrada\", () => {\r\n    const a = buildDailySeed(\"2026-03-21\", \"global\", \"cover\");\r\n    const b = buildDailySeed(\"2026-03-21\", \"global\", \"cover\");\r\n    const c = buildDailySeed(\"2026-03-21\", \"global\", \"riddle\");\r\n\r\n    expect(a).toBe(b);\r\n    expect(a).not.toBe(c);\r\n  });\r\n\r\n  it(\"getTodayKey retorna formato YYYY-MM-DD\", () => {\r\n    vi.useFakeTimers();\r\n    vi.setSystemTime(new Date(\"2026-03-21T13:05:00Z\"));\r\n\r\n    expect(getTodayKey()).toBe(\"2026-03-21\");\r\n\r\n    vi.useRealTimers();\r\n  });\r\n\r\n  it(\"formatTodayKeyDDMMYYYY converte para DD/MM/YYYY e preserva valor invalido\", () => {\r\n    expect(formatTodayKeyDDMMYYYY(\"2026-03-22\")).toBe(\"22/03/2026\");\r\n    expect(formatTodayKeyDDMMYYYY(\"data-invalida\")).toBe(\"data-invalida\");\r\n  });\r\n\r\n  it(\"normalizeText remove acentos e espacos extras\", () => {\r\n    expect(normalizeText(\"  Coração Valente  \")).toBe(\"coracao valente\");\r\n    expect(normalizeText(undefined)).toBe(\"\");\r\n  });\r\n\r\n  it(\"toMovieProfileFromApp converte e aplica defaults\", () => {\r\n    const profile = toMovieProfileFromApp(\r\n      makeMovie({ title: undefined, countries: [\"United States\"], cast: [\"A\", \"B\", \"C\", \"D\", \"E\", \"F\"] })\r\n    );\r\n\r\n    expect(profile.tmdbId).toBe(550);\r\n    expect(profile.title).toBe(\"Sem titulo\");\r\n    expect(profile.releaseYear).toBe(2002);\r\n    expect(profile.countries).toEqual([\"Estados Unidos\"]);\r\n    expect(profile.cast).toEqual([\"A\", \"B\", \"C\", \"D\", \"E\"]);\r\n    expect(profile.posterPath).toBe(\"/poster.jpg\");\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb converte crew, cast e campos opcionais\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 99,\r\n      title: \"Filme Teste\",\r\n      release_date: \"1999-12-31\",\r\n      runtime: 123,\r\n      poster_path: \"/abc.jpg\",\r\n      genres: [{ name: \"Drama\" }, { name: \"Sci-Fi\" }],\r\n      production_countries: [{ name: \"Japan\" }],\r\n      credits: {\r\n        crew: [{ job: \"Writer\", name: \"W\" }, { job: \"Director\", name: \"D\" }],\r\n        cast: [{ name: \"A1\" }, { name: \"A2\" }, { name: \"A3\" }, { name: \"A4\" }, { name: \"A5\" }, { name: \"A6\" }],\r\n      },\r\n    });\r\n\r\n    expect(profile.tmdbId).toBe(99);\r\n    expect(profile.director).toBe(\"D\");\r\n    expect(profile.genres).toEqual([\"Drama\", \"Sci-Fi\"]);\r\n    expect(profile.countries).toEqual([\"Japao\"]);\r\n    expect(profile.cast).toEqual([\"A1\", \"A2\", \"A3\", \"A4\", \"A5\"]);\r\n  });\r\n\r\n  it(\"toMovieProfileFromApp aplica fallbacks quando campos opcionais estao ausentes\", () => {\r\n    const profile = toMovieProfileFromApp(\r\n      makeMovie({\r\n        release_date: \"xx\",\r\n        countries: [],\r\n        cast: [],\r\n        poster_path: undefined,\r\n      })\r\n    );\r\n\r\n    expect(profile.releaseYear).toBeUndefined();\r\n    expect(profile.countries).toEqual([]);\r\n    expect(profile.cast).toEqual([]);\r\n    expect(profile.posterPath).toBeUndefined();\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb lida com credits e campos vazios\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 7,\r\n      title: undefined,\r\n      release_date: \"\",\r\n      runtime: 0,\r\n      poster_path: \"\",\r\n      genres: [{ name: \"\" }],\r\n      production_countries: [{ name: \"\" }],\r\n      credits: {\r\n        crew: [{ job: \"Writer\", name: \"W\" }],\r\n        cast: [{ name: \"\" }],\r\n      },\r\n    });\r\n\r\n    expect(profile.tmdbId).toBe(7);\r\n    expect(profile.title).toBe(\"Sem titulo\");\r\n    expect(profile.releaseYear).toBeUndefined();\r\n    expect(profile.director).toBeUndefined();\r\n    expect(profile.genres).toEqual([]);\r\n    expect(profile.countries).toEqual([]);\r\n    expect(profile.cast).toEqual([]);\r\n    expect(profile.runtime).toBeUndefined();\r\n    expect(profile.posterPath).toBeUndefined();\r\n  });\r\n\r\n  it(\"pickDeterministicMovie retorna null para pool vazio e item por seed\", () => {\r\n    expect(pickDeterministicMovie<"+"number>([], 1)).toBeNull();\r\n    expect(pickDeterministicMovie([10, 20, 30], 4)).toBe(20);\r\n  });\r\n\r\n  it(\"parseYear with short date returns undefined\", () => {\r\n    const profile1 = toMovieProfileFromApp(makeMovie({ release_date: \"20\" }));\r\n    const profile2 = toMovieProfileFromApp(makeMovie({ release_date: \"\" }));\r\n    const profile3 = toMovieProfileFromApp(makeMovie({ release_date: undefined }));\r\n\r\n    expect(profile1.releaseYear).toBeUndefined();\r\n    expect(profile2.releaseYear).toBeUndefined();\r\n    expect(profile3.releaseYear).toBeUndefined();\r\n  });\r\n\r\n  it(\"toMovieProfileFromApp with minimal cast array\", () => {\r\n    const profile = toMovieProfileFromApp(makeMovie({ cast: [\"A\"] }));\r\n    expect(profile.cast).toEqual([\"A\"]);\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb with empty credits array\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 42,\r\n      title: \"Test\",\r\n      credits: {\r\n        crew: [],\r\n        cast: [],\r\n      },\r\n    });\r\n\r\n    expect(profile.director).toBeUndefined();\r\n    expect(profile.cast).toEqual([]);\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb with missing credentials object\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 42,\r\n      title: \"Test\",\r\n      credits: undefined,\r\n    });\r\n\r\n    expect(profile.director).toBeUndefined();\r\n    expect(profile.cast).toEqual([]);\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb with undefined credits\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 42,\r\n      title: \"Test\",\r\n      credits: undefined,\r\n    });\r\n\r\n    expect(profile.director).toBeUndefined();\r\n    expect(profile.cast).toEqual([]);\r\n  });\r\n\r\n  it(\"getListLabel with empty array returns Nao informado\", () => {\r\n    expect(getListLabel([])).toBe(\"Nao informado\");\r\n    expect(getListLabel([\"A\", \"B\"])).toBe(\"A, B\");\r\n  });\r\n\r\n  it(\"parseYear handles string length exactly 4\", () => {\r\n    const profile = toMovieProfileFromApp(makeMovie({ release_date: \"2020\" }));\r\n    expect(profile.releaseYear).toBe(2020);\r\n  });\r\n\r\n  it(\"toMovieProfileFromApp with single cast member\", () => {\r\n    const profile = toMovieProfileFromApp(makeMovie({ cast: [\"Solo\"] }));\r\n    expect(profile.cast).toEqual([\"Solo\"]);\r\n    expect(profile.cast.length).toBe(1);\r\n  });\r\n\r\n  it(\"toMovieProfileFromApp with 6 cast members returns only 5\", () => {\r\n    const profile = toMovieProfileFromApp(makeMovie({ cast: [\"A\", \"B\", \"C\", \"D\", \"E\", \"F\"] }));\r\n    expect(profile.cast.length).toBe(5);\r\n    expect(profile.cast).toEqual([\"A\", \"B\", \"C\", \"D\", \"E\"]);\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb with crew array has Array.isArray true condition\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 1,\r\n      credits: {\r\n        crew: [{ job: \"Director\", name: \"Christopher Nolan\" }],\r\n        cast: [],\r\n      },\r\n    });\r\n\r\n    expect(profile.director).toBe(\"Christopher Nolan\");\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb crew with no director still filters\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 1,\r\n      credits: {\r\n        crew: [{ job: \"Producer\", name: \"Producer Name\" }, { job: \"Writer\", name: \"Writer Name\" }],\r\n        cast: [],\r\n      },\r\n    });\r\n\r\n    expect(profile.director).toBeUndefined();\r\n  });\r\n\r\n  it(\"toMovieProfileFromTmdb cast map and filter chain\", () => {\r\n    const profile = toMovieProfileFromTmdb({\r\n      id: 1,\r\n      credits: {\r\n        crew: [],\r\n        cast: [{ name: \"A\" }, { name: \"\" }, { name: \"B\" }, { name: \"C\" }, { name: \"D\" }, { name: \"E\" }],\r\n      },\r\n    });\r\n\r\n    expect(profile.cast.filter((x) => x).length).toBeGreaterThan(0);\r\n    expect(profile.cast.length).toBeLessThanOrEqual(5);\r\n  });\r\n\r\n  it(\"getListLabel monta texto ou fallback\", () => {\r\n    expect(getListLabel([\"A\", \"B\"])).toBe(\"A, B\");\r\n    expect(getListLabel([])).toBe(\"Nao informado\");\r\n  });\r\n});\r\n"},"src/features/games/logic/__tests__/dailyGameLogic.test.ts":{"tests":[{"id":"101","name":"dailyGameLogic normaliza paises para pt-BR"},{"id":"102","name":"dailyGameLogic ano mostra direcao correta"},{"id":"103","name":"dailyGameLogic paises ficam corretos quando todos batem"},{"id":"104","name":"dailyGameLogic paises ficam perto quando existe intersecao parcial"},{"id":"105","name":"dailyGameLogic atores ficam corretos apenas quando os 5 batem"},{"id":"106","name":"dailyGameLogic ano fica perto no intervalo de ±5"},{"id":"107","name":"dailyGameLogic diretor fica close quando nome e substring"},{"id":"108","name":"dailyGameLogic genero fica close quando ha correspondencia parcial"},{"id":"109","name":"dailyGameLogic resumo consolida melhor status por campo"},{"id":"110","name":"dailyGameLogic busca TMDB so no modo global"},{"id":"111","name":"dailyGameLogic capa fica mais pixelada e borrada no inicio"},{"id":"112","name":"dailyGameLogic fallback de pais e campos sem dados ficam como wrong/nao informado"},{"id":"113","name":"dailyGameLogic runtime fica close para diferenca moderada"}],"source":"import { describe, expect, it } from \"vitest\";\r\nimport {\r\n  buildGuessSummary,\r\n  compareMovieProfiles,\r\n  getCoverRevealState,\r\n  getYearDirectionHint,\r\n  normalizeCountriesToPtBr,\r\n  shouldUseTmdbSuggestions,\r\n  type GameMovieProfile,\r\n} from \"../dailyGameLogic\";\r\n\r\nfunction makeProfile(overrides: Partial<"+"GameMovieProfile> = {}): GameMovieProfile {\r\n  return {\r\n    tmdbId: 1,\r\n    title: \"Filme X\",\r\n    releaseYear: 2010,\r\n    director: \"Diretor A\",\r\n    genres: [\"Drama\"],\r\n    countries: [\"Estados Unidos\"],\r\n    cast: [\"Ator 1\", \"Ator 2\", \"Ator 3\", \"Ator 4\", \"Ator 5\"],\r\n    runtime: 120,\r\n    ...overrides,\r\n  };\r\n}\r\n\r\ndescribe(\"dailyGameLogic\", () => {\r\n  it(\"normaliza paises para pt-BR\", () => {\r\n    const result = normalizeCountriesToPtBr([\"United States\", \"Japan\", \"Brasil\"]);\r\n    expect(result).toEqual([\"Estados Unidos\", \"Japao\", \"Brasil\"]);\r\n  });\r\n\r\n  it(\"ano mostra direcao correta\", () => {\r\n    expect(getYearDirectionHint(2000, 2005)).toContain(\"mais atual\");\r\n    expect(getYearDirectionHint(2010, 2005)).toContain(\"mais antigo\");\r\n    expect(getYearDirectionHint(2005, 2005)).toBe(\"\");\r\n  });\r\n\r\n  it(\"paises ficam corretos quando todos batem\", () => {\r\n    const guess = makeProfile({ countries: [\"Estados Unidos\", \"Japao\"] });\r\n    const target = makeProfile({ countries: [\"Estados Unidos\", \"Japao\"] });\r\n\r\n    const result = compareMovieProfiles(guess, target);\r\n    const countryField = result.fields.find((f) => f.label === \"Paises\");\r\n    expect(countryField?.status).toBe(\"correct\");\r\n  });\r\n\r\n  it(\"paises ficam perto quando existe intersecao parcial\", () => {\r\n    const guess = makeProfile({ countries: [\"Estados Unidos\", \"Canada\"] });\r\n    const target = makeProfile({ countries: [\"Estados Unidos\", \"Japao\"] });\r\n\r\n    const result = compareMovieProfiles(guess, target);\r\n    const countryField = result.fields.find((f) => f.label === \"Paises\");\r\n    expect(countryField?.status).toBe(\"close\");\r\n  });\r\n\r\n  it(\"atores ficam corretos apenas quando os 5 batem\", () => {\r\n    const targetCast = [\"A\", \"B\", \"C\", \"D\", \"E\"];\r\n    const guessAll = makeProfile({ cast: targetCast });\r\n    const target = makeProfile({ cast: targetCast });\r\n\r\n    const resultAll = compareMovieProfiles(guessAll, target);\r\n    const fieldAll = resultAll.fields.find((f) => f.label === \"Ator/Atriz principal\");\r\n    expect(fieldAll?.status).toBe(\"correct\");\r\n\r\n    const guessPartial = makeProfile({ cast: [\"A\", \"X\", \"Y\", \"Z\", \"W\"] });\r\n    const resultPartial = compareMovieProfiles(guessPartial, target);\r\n    const fieldPartial = resultPartial.fields.find((f) => f.label === \"Ator/Atriz principal\");\r\n    expect(fieldPartial?.status).toBe(\"close\");\r\n  });\r\n\r\n  it(\"ano fica perto no intervalo de ±5\", () => {\r\n    const guess = makeProfile({ releaseYear: 2005 });\r\n    const target = makeProfile({ releaseYear: 2010 });\r\n    const result = compareMovieProfiles(guess, target);\r\n    const yearField = result.fields.find((f) => f.label === \"Ano\");\r\n    expect(yearField?.status).toBe(\"close\");\r\n  });\r\n\r\n  it(\"diretor fica close quando nome e substring\", () => {\r\n    const guess = makeProfile({ director: \"Christopher Nolan\" });\r\n    const target = makeProfile({ director: \"Nolan\" });\r\n\r\n    const result = compareMovieProfiles(guess, target);\r\n    const directorField = result.fields.find((f) => f.label === \"Diretor\");\r\n    expect(directorField?.status).toBe(\"close\");\r\n  });\r\n\r\n  it(\"genero fica close quando ha correspondencia parcial\", () => {\r\n    const guess = makeProfile({ genres: [\"Science\"] });\r\n    const target = makeProfile({ genres: [\"Science Fiction\"] });\r\n\r\n    const result = compareMovieProfiles(guess, target);\r\n    const genreField = result.fields.find((f) => f.label === \"Genero\");\r\n    expect(genreField?.status).toBe(\"close\");\r\n  });\r\n\r\n  it(\"resumo consolida melhor status por campo\", () => {\r\n    const target = makeProfile({ tmdbId: 99, title: \"Alvo\", releaseYear: 2015 });\r\n    const guess1 = compareMovieProfiles(makeProfile({ tmdbId: 1, releaseYear: 1990, director: \"Outro\" }), target);\r\n    const guess2 = compareMovieProfiles(makeProfile({ tmdbId: 2, releaseYear: 2014, director: \"Diretor A\" }), target);\r\n\r\n    const summary = buildGuessSummary([guess1, guess2], 3);\r\n    expect(summary.attempts).toBe(2);\r\n    expect(summary.livesLeft).toBe(3);\r\n    const year = summary.fields.find((f) => f.label === \"Ano\");\r\n    expect(year?.status).toBe(\"close\");\r\n  });\r\n\r\n  it(\"busca TMDB so no modo global\", () => {\r\n    expect(shouldUseTmdbSuggestions(\"global_daily\")).toBe(true);\r\n    expect(shouldUseTmdbSuggestions(\"my_watched\")).toBe(false);\r\n    expect(shouldUseTmdbSuggestions(\"list_scope\")).toBe(false);\r\n  });\r\n\r\n  it(\"capa fica mais pixelada e borrada no inicio\", () => {\r\n    const early = getCoverRevealState(6, false, 6);\r\n    const oneMiss = getCoverRevealState(5, false, 6);\r\n    const mid = getCoverRevealState(3, false, 6);\r\n    const lowLives = getCoverRevealState(1, false, 6);\r\n    const win = getCoverRevealState(6, true, 6);\r\n\r\n    expect(early.blurPx).toBeGreaterThan(mid.blurPx);\r\n    expect(mid.blurPx).toBeGreaterThan(lowLives.blurPx);\r\n    expect(early.posterSize).toBe(\"w92\");\r\n    expect(early.gridSize).toBe(10);\r\n    expect(early.totalTiles).toBe(100);\r\n    expect(oneMiss.revealTiles - early.revealTiles).toBeLessThan(lowLives.revealTiles - mid.revealTiles);\r\n    expect(lowLives.revealTiles).toBeGreaterThan(mid.revealTiles);\r\n    expect(win.posterSize).toBe(\"w500\");\r\n    expect(win.blurPx).toBe(0);\r\n    expect(win.revealTiles).toBe(win.totalTiles);\r\n  });\r\n\r\n  it(\"fallback de pais e campos sem dados ficam como wrong/nao informado\", () => {\r\n    const guess = makeProfile({\r\n      countries: [\"Atlantis\"],\r\n      direc
