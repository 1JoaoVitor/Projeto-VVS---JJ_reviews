tor: undefined,\r\n      releaseYear: undefined,\r\n      genres: [],\r\n      cast: [],\r\n      runtime: undefined,\r\n    });\r\n    const target = makeProfile({\r\n      countries: [\"Unknownland\"],\r\n      director: undefined,\r\n      releaseYear: undefined,\r\n      genres: [\"Drama\"],\r\n      cast: [\"Actor A\"],\r\n      runtime: undefined,\r\n    });\r\n\r\n    expect(normalizeCountriesToPtBr([\"Atlantis\"])).toEqual([\"Atlantis\"]);\r\n\r\n    const result = compareMovieProfiles(guess, target);\r\n\r\n    expect(result.isCorrect).toBe(true);\r\n    expect(result.fields.find((f) => f.label === \"Diretor\")?.guessed).toBe(\"Nao informado\");\r\n    expect(result.fields.find((f) => f.label === \"Ano\")?.status).toBe(\"wrong\");\r\n    expect(result.fields.find((f) => f.label === \"Duracao\")?.status).toBe(\"wrong\");\r\n    expect(result.fields.find((f) => f.label === \"Genero\")?.status).toBe(\"wrong\");\r\n  });\r\n\r\n  it(\"runtime fica close para diferenca moderada\", () => {\r\n    const guess = makeProfile({ runtime: 130 });\r\n    const target = makeProfile({ runtime: 146 });\r\n\r\n    const result = compareMovieProfiles(guess, target);\r\n    const runtime = result.fields.find((f) => f.label === \"Duracao\");\r\n\r\n    expect(runtime?.status).toBe(\"close\");\r\n  });\r\n});\r\n"},"src/features/lists/logic/__tests__/listOperations.test.ts":{"tests":[{"id":"114","name":"listOperations (Functional Core) 1. mergeLists deve juntar dois arrays de listas corretamente"},{"id":"115","name":"listOperations (Functional Core) 1. mergeLists Sad Path: deve retornar array vazio se receber null ou undefined"},{"id":"116","name":"listOperations (Functional Core) 2. deduplicateLists deve remover listas com IDs duplicados, mantendo a primeira ocorrência"},{"id":"117","name":"listOperations (Functional Core) 3. mapListCounts deve extrair a contagem correta da estrutura aninhada do Supabase"},{"id":"118","name":"listOperations (Functional Core) 3. mapListCounts deve extrair likes_count da estrutura list_likes"},{"id":"119","name":"listOperations (Functional Core) 3. mapListCounts Sad Path: deve mapear o movie_count para 0 se o list_movies vier nulo, vazio ou sem count"},{"id":"120","name":"listOperations (Functional Core) 3. mapListCounts Sad Path: deve mapear likes_count para 0 em estruturas invalidas de list_likes"},{"id":"121","name":"listOperations (Functional Core) 4. sortListsByDate deve ordenar as listas da mais recente para a mais antiga"},{"id":"122","name":"listOperations (Functional Core) 4. sortListsByDate Sad Path: deve jogar datas inválidas ou nulas para o final da ordenação"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { \r\n   mergeLists, \r\n   deduplicateLists, \r\n   mapListCounts, \r\n   sortListsByDate,\r\n   type RawSupabaseList\r\n} from \"../listOperations\";\r\nimport type { CustomList } from \"@/types\";\r\n\r\n// Helper para criar os dados crus simulando o banco de dados\r\nconst makeRawList = (id: string, name: string, date: string, count?: number): RawSupabaseList => ({\r\n   id,\r\n   owner_id: \"user_1\",\r\n   name,\r\n   type: \"private\" as const,\r\n   created_at: date,\r\n   list_movies: count !== undefined ? [{ count }] : [],\r\n});\r\n\r\ndescribe(\"listOperations (Functional Core)\", () => {\r\n\r\n   describe(\"1. mergeLists\", () => {\r\n      it(\"deve juntar dois arrays de listas corretamente\", () => {\r\n         const myLists = [makeRawList(\"1\", \"A\", \"2023\")];\r\n         const sharedLists = [makeRawList(\"2\", \"B\", \"2023\")];\r\n         \r\n         const result = mergeLists(myLists, sharedLists);\r\n         expect(result).toHaveLength(2);\r\n         expect(result[0].id).toBe(\"1\");\r\n         expect(result[1].id).toBe(\"2\");\r\n      });\r\n\r\n      it(\"Sad Path: deve retornar array vazio se receber null ou undefined\", () => {\r\n         expect(mergeLists(null, undefined)).toEqual([]);\r\n      });\r\n   });\r\n\r\n   describe(\"2. deduplicateLists\", () => {\r\n      it(\"deve remover listas com IDs duplicados, mantendo a primeira ocorrência\", () => {\r\n         const listA = makeRawList(\"1\", \"Lista Única\", \"2023\");\r\n         const listB = makeRawList(\"1\", \"Lista Duplicada (Bug do DB)\", \"2023\"); // Mesmo ID!\r\n         const listC = makeRawList(\"2\", \"Outra Lista\", \"2023\");\r\n\r\n         const result = deduplicateLists([listA, listB, listC]);\r\n\r\n         expect(result).toHaveLength(2);\r\n         expect(result[0].name).toBe(\"Lista Única\"); // A primeira sobreviveu\r\n         expect(result[1].id).toBe(\"2\");\r\n      });\r\n   });\r\n\r\n   describe(\"3. mapListCounts\", () => {\r\n      it(\"deve extrair a contagem correta da estrutura aninhada do Supabase\", () => {\r\n         const lists = [\r\n            makeRawList(\"1\", \"Com Filmes\", \"2023\", 10),\r\n            makeRawList(\"2\", \"Sem Filmes\", \"2023\", 0),\r\n         ];\r\n\r\n         const result = mapListCounts(lists);\r\n\r\n         expect(result[0].movie_count).toBe(10);\r\n         expect(result[1].movie_count).toBe(0);\r\n         \r\n         // Garante que a propriedade original suja 'list_movies' foi removida\r\n         expect(result[0]).not.toHaveProperty(\"list_movies\");\r\n      });\r\n\r\n      it(\"deve extrair likes_count da estrutura list_likes\", () => {\r\n         const lists: RawSupabaseList[] = [\r\n            {\r\n               ...makeRawList(\"1\", \"Com Likes\", \"2023\", 1),\r\n               list_likes: [{ count: 7 }],\r\n            },\r\n         ];\r\n\r\n         const result = mapListCounts(lists);\r\n\r\n         expect(result[0].likes_count).toBe(7);\r\n      });\r\n\r\n      it(\"Sad Path: deve mapear o movie_count para 0 se o list_movies vier nulo, vazio ou sem count\", () => {\r\n         const corruptedLists = [\r\n            { id: \"1\", list_movies: null },\r\n            { id: \"2\", list_movies: [] },\r\n            { id: \"3\", list_movies: [{ something: 123 }] }, // Objeto sem 'count'\r\n            { id: \"4\", list_movies: \"lixo em formato de string\" },\r\n         ];\r\n\r\n         // @ts-expect-error: Injetando estrutura corrompida propositalmente\r\n         const result = mapListCounts(corruptedLists);\r\n\r\n         expect(result[0].movie_count).toBe(0);\r\n         expect(result[1].movie_count).toBe(0);\r\n         expect(result[2].movie_count).toBe(0);\r\n         expect(result[3].movie_count).toBe(0);\r\n      });\r\n\r\n      it(\"Sad Path: deve mapear likes_count para 0 em estruturas invalidas de list_likes\", () => {\r\n         const corruptedLists = [\r\n            { id: \"1\", list_likes: null },\r\n            { id: \"2\", list_likes: [] },\r\n            { id: \"3\", list_likes: [{ wrong: 10 }] },\r\n            { id: \"4\", list_likes: \"invalid\" },\r\n         ];\r\n\r\n         // @ts-expect-error: Injetando estrutura corrompida propositalmente\r\n         const result = mapListCounts(corruptedLists);\r\n\r\n         expect(result[0].likes_count).toBe(0);\r\n         expect(result[1].likes_count).toBe(0);\r\n         expect(result[2].likes_count).toBe(0);\r\n         expect(result[3].likes_count).toBe(0);\r\n      });\r\n   });\r\n\r\n   describe(\"4. sortListsByDate\", () => {\r\n      it(\"deve ordenar as listas da mais recente para a mais antiga\", () => {\r\n         // Já convertidas para CustomList (com movie_count)\r\n         const lists: CustomList[] = [\r\n            { id: \"1\", created_at: \"2023-01-01T10:00:00Z\" } as CustomList, // Antiga\r\n            { id: \"2\", created_at: \"2023-01-03T10:00:00Z\" } as CustomList, // Nova\r\n            { id: \"3\", created_at: \"2023-01-02T10:00:00Z\" } as CustomList, // Média\r\n         ];\r\n\r\n         const result = sortListsByDate(lists);\r\n\r\n         expect(result[0].id).toBe(\"2\");\r\n         expect(result[1].id).toBe(\"3\"); \r\n         expect(result[2].id).toBe(\"1\");\r\n      });\r\n\r\n      it(\"Sad Path: deve jogar datas inválidas ou nulas para o final da ordenação\", () => {\r\n         const lists: CustomList[] = [\r\n            { id: \"1\", created_at: \"data-invalida\" } as CustomList,\r\n            { id: \"2\", created_at: \"2023-01-01T10:00:00Z\" } as CustomList,\r\n         ];\r\n\r\n         const result = sortListsByDate(lists);\r\n\r\n         expect(result[0].id).toBe(\"2\");\r\n         expect(result[1].id).toBe(\"1\");\r\n      });\r\n   });\r\n\r\n});"},"src/features/movies/logic/__tests__/enrichMovie.test.ts":{"tests":[{"id":"123","name":"mapTmdbToMovieData (Functional Core) deve mapear os dados crus do TMDB e juntar com os dados do banco local"},{"id":"124","name":"mapTmdbToMovieData (Functional Core) deve identificar um filme como Nacional e como Indicado ao Oscar do ano corrente"},{"id":"125","name":"Tratamento de Falhas e Dados Ausentes) deve lidar com uma resposta do TMDB completamente vazia sem quebrar a aplicação (Fallback Seguro)"},{"id":"126","name":"Tratamento de Falhas e Dados Ausentes) deve ignorar códigos de país inválidos no Intl.DisplayNames sem lançar exceção (Try/Catch)"},{"id":"127","name":"Tratamento de Falhas e Dados Ausentes) deve retornar providers vazio se a árvore de watch/providers do TMDB vier pela metade"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { mapTmdbToMovieData, type TmdbRawResponse, type BaseMovieRow } from \"../enrichMovie\";\r\n\r\nconst makeSupabaseRow = (overrides: Partial<"+"BaseMovieRow> = {}): BaseMovieRow => ({\r\n   id: 1,\r\n   tmdb_id: 100,\r\n   status: \"watched\",\r\n   ...overrides,\r\n});\r\n\r\nconst makeTmdbRaw = (overrides: Partial<"+"TmdbRawResponse> = {}): TmdbRawResponse => ({\r\n   title: \"Filme Padrão\",\r\n   ...overrides,\r\n});\r\n\r\ndescribe(\"mapTmdbToMovieData (Functional Core)\", () => {\r\n   \r\n   it(\"deve mapear os dados crus do TMDB e juntar com os dados do banco local\", () => {\r\n      const mockSupabaseRow = makeSupabaseRow({\r\n         id: 42,\r\n         tmdb_id: 550,\r\n         rating: 9,\r\n         review: \"Filme incrível!\",\r\n      });\r\n\r\n      const mockTmdbRaw = makeTmdbRaw({\r\n         title: \"Clube da Luta\",\r\n         overview: \"Primeira regra...\",\r\n         poster_path: \"/luta.jpg\",\r\n         runtime: 139,\r\n         release_date: \"1999-10-15\",\r\n         genres: [{ id: 1, name: \"Drama\" }, { id: 2, name: \"Suspense\" }],\r\n         production_countries: [{ iso_3166_1: \"US\", name: \"United States of America\" }],\r\n         credits: {\r\n            crew: [\r\n               { job: \"Director\", name: \"David Fincher\" },\r\n               { job: \"Producer\", name: \"Art Linson\" }\r\n            ],\r\n            cast: [\r\n               { name: \"Brad Pitt\" },\r\n               { name: \"Edward Norton\" },\r\n               { name: \"Helena Bonham Carter\" },\r\n               { name: \"Meat Loaf\" },\r\n               { name: \"Jared Leto\" },\r\n               { name: \"Zach Grenier\" } \r\n            ]\r\n         },\r\n         \"watch/providers\": {\r\n            results: {\r\n               BR: {\r\n                  flatrate: [{ provider_id: 8, provider_name: \"Netflix\", logo_path: \"/netflix.jpg\" }]\r\n               }\r\n            }\r\n         }\r\n      });\r\n\r\n      const result = mapTmdbToMovieData(mockSupabaseRow, mockTmdbRaw, [100, 200]);\r\n\r\n      expect(result.id).toBe(42);\r\n      expect(result.title).toBe(\"Clube da Luta\");\r\n      expect(result.director).toBe(\"David Fincher\");\r\n      expect(result.cast).toHaveLength(5); // Ignora o 6º ator\r\n      expect(result.cast).toContain(\"Brad Pitt\");\r\n      expect(result.genres).toEqual([\"Drama\", \"Suspense\"]);\r\n      expect(result.runtime).toBe(139);\r\n      expect(result.isNational).toBe(false);\r\n      expect(result.isOscar).toBe(false);\r\n      expect(result.providers?.[0].provider_name).toBe(\"Netflix\");\r\n   });\r\n\r\n   it(\"deve identificar um filme como Nacional e como Indicado ao Oscar do ano corrente\", () => {\r\n      const mockSupabaseRow = makeSupabaseRow({ id: 2, tmdb_id: 12345 });\r\n      \r\n      const mockTmdbRaw = makeTmdbRaw({\r\n         title: \"O Agente Secreto\",\r\n         production_countries: [{ iso_3166_1: \"BR\", name: \"Brazil\" }],\r\n      });\r\n\r\n      // Passa  o ID 12345 na lista de indicados (OSCAR_NOMINEES_IDS simulado)\r\n      const result = mapTmdbToMovieData(mockSupabaseRow, mockTmdbRaw, [12345, 67890]);\r\n\r\n      expect(result.isNational).toBe(true);\r\n      expect(result.isOscar).toBe(true); // Verdadeiro porque o tmdb_id está no array de indicados\r\n   });\r\n});\r\n\r\ndescribe(\"Tratamento de Falhas e Dados Ausentes)\", () => {\r\n      it(\"deve lidar com uma resposta do TMDB completamente vazia sem quebrar a aplicação (Fallback Seguro)\", () => {\r\n         const mockSupabaseRow = makeSupabaseRow({ id: 99, tmdb_id: 101 });\r\n         const emptyTmdbRaw = {} as TmdbRawResponse; // Simulando falha silenciosa da API\r\n\r\n         const result = mapTmdbToMovieData(mockSupabaseRow, emptyTmdbRaw);\r\n\r\n         expect(result.title).toBe(\"Título Desconhecido\");\r\n         expect(result.director).toBe(\"Desconhecido\"); \r\n         expect(result.cast).toEqual([]);\r\n         expect(result.genres).toEqual([]);\r\n         expect(result.runtime).toBe(0);\r\n         expect(result.countries).toEqual([]);\r\n      });\r\n\r\n      it(\"deve ignorar códigos de país inválidos no Intl.DisplayNames sem lançar exceção (Try/Catch)\", () => {\r\n         const mockSupabaseRow = makeSupabaseRow();\r\n         const tmdbWithBadCountry = makeTmdbRaw({\r\n            production_countries: [{ iso_3166_1: \"XX\", name: \"País Inventado\" }]\r\n         });\r\n\r\n         const result = mapTmdbToMovieData(mockSupabaseRow, tmdbWithBadCountry);\r\n\r\n         // Como falhou a tradução, tem de devolver o nome original que veio da API\r\n         expect(result.countries).toContain(\"País Inventado\");\r\n      });\r\n      \r\n      it(\"deve retornar providers vazio se a árvore de watch/providers do TMDB vier pela metade\", () => {\r\n         const mockSupabaseRow = makeSupabaseRow();\r\n         const tmdbBrokenProviders = makeTmdbRaw({\r\n            \"watch/providers\": { results: {} } // Sem a região BR\r\n         });\r\n\r\n         const result = mapTmdbToMovieData(mockSupabaseRow, tmdbBrokenProviders);\r\n\r\n         expect(result.providers).toEqual([]);\r\n      });\r\n   });"},"src/features/movies/logic/__tests__/filterMovies.test.ts":{"tests":[{"id":"128","name":"filterMovies (Functional Core) deve filtrar corretamente pela aba (viewMode)"},{"id":"129","name":"filterMovies (Functional Core) deve retornar todos os filmes se viewMode for 'lists' (ignora status)"},{"id":"130","name":"filterMovies (Functional Core) deve filtrar corretamente por busca de texto (título case-insensitive)"},{"id":"131","name":"filterMovies (Functional Core) deve combinar filtros: Nacional + Oscar"},{"id":"132","name":"filterMovies (Functional Core) deve filtrar filmes Internacionais (que não contêm 'Estados Unidos')"},{"id":"133","name":"Tratamento de Falhas não deve quebrar se os filmes não tiverem gêneros ou diretores cadastrados"},{"id":"134","name":"Tratamento de Falhas deve ser case-insensitive e ignorar espaços extras na busca"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { filterMovies, type MovieFilters } from \"../filterMovies\";\r\nimport type { MovieData } from \"@/types\";\r\n\r\n// Factory de filmes\r\nconst makeMovie = (overrides: Partial<"+"MovieData> = {}): MovieData => ({\r\n   id: 1,\r\n   tmdb_id: 100,\r\n   title: \"Filme Padrão\",\r\n   status: \"watched\",\r\n   isNational: false,\r\n   isOscar: false,\r\n   countries: [\"Estados Unidos\"],\r\n   genres: [\"Ação\"],\r\n   director: \"Diretor Padrão\",\r\n   cast: [\"Ator 1\"],\r\n   ...overrides,\r\n} as MovieData);\r\n\r\n// Filtros padrão para facilitar a escrita dos testes, evitando repetir os mesmos valores\r\nconst defaultFilters: MovieFilters = {\r\n   viewMode: \"watched\",\r\n   searchTerm: \"\",\r\n   onlyNational: false,\r\n   onlyOscar: false,\r\n   onlyInternational: false,\r\n   selectedGenre: \"\",\r\n   selectedDirector: \"\",\r\n};\r\n\r\ndescribe(\"filterMovies (Functional Core)\", () => {\r\n   \r\n   it(\"deve filtrar corretamente pela aba (viewMode)\", () => {\r\n      const movies = [\r\n         makeMovie({ id: 1, status: \"watched\" }),\r\n         makeMovie({ id: 2, status: \"watchlist\" }),\r\n      ];\r\n\r\n      const result = filterMovies(movies, { ...defaultFilters, viewMode: \"watchlist\" });\r\n      \r\n      expect(result).toHaveLength(1);\r\n      expect(result[0].id).toBe(2);\r\n   });\r\n\r\n   it(\"deve retornar todos os filmes se viewMode for 'lists' (ignora status)\", () => {\r\n      const movies = [\r\n         makeMovie({ id: 1, status: \"watched\" }),\r\n         makeMovie({ id: 2, status: \"watchlist\" }),\r\n      ];\r\n\r\n      const result = filterMovies(movies, { ...defaultFilters, viewMode: \"lists\" });\r\n      \r\n      expect(result).toHaveLength(2);\r\n   });\r\n\r\n   it(\"deve filtrar corretamente por busca de texto (título case-insensitive)\", () => {\r\n      const movies = [\r\n         makeMovie({ id: 1, title: \"O Auto da Compadecida\" }),\r\n         makeMovie({ id: 2, title: \"Cidade de Deus\" }),\r\n      ];\r\n\r\n      const result = filterMovies(movies, { ...defaultFilters, searchTerm: \"compadecida\" });\r\n      \r\n      expect(result).toHaveLength(1);\r\n      expect(result[0].id).toBe(1);\r\n   });\r\n\r\n   it(\"deve combinar filtros: Nacional + Oscar\", () => {\r\n      const movies = [\r\n         makeMovie({ id: 1, isNational: true, isOscar: true }),\r\n         makeMovie({ id: 2, isNational: true, isOscar: false }),\r\n         makeMovie({ id: 3, isNational: false, isOscar: true }),\r\n      ];\r\n\r\n      const result = filterMovies(movies, { \r\n         ...defaultFilters, \r\n         onlyNational: true, \r\n         onlyOscar: true \r\n      });\r\n      \r\n      expect(result).toHaveLength(1);\r\n      expect(result[0].id).toBe(1);\r\n   });\r\n\r\n   it(\"deve filtrar filmes Internacionais (que não contêm 'Estados Unidos')\", () => {\r\n      const movies = [\r\n         makeMovie({ id: 1, countries: [\"Brasil\", \"França\"] }), \r\n         makeMovie({ id: 2, countries: [\"Estados Unidos\", \"Reino Unido\"] }), \r\n         makeMovie({ id: 3, countries: [\"Japão\"] }),\r\n      ];\r\n\r\n      const result = filterMovies(movies, { ...defaultFilters, onlyInternational: true });\r\n      \r\n      expect(result).toHaveLength(2);\r\n      expect(result.map(m => m.id)).toEqual([1, 3]);\r\n   });\r\n\r\n});\r\n\r\ndescribe(\"Tratamento de Falhas\", () => {\r\n   it(\"não deve quebrar se os filmes não tiverem gêneros ou diretores cadastrados\", () => {\r\n      const moviesWithoutData: MovieData[] = [\r\n         // @ts-expect-error: Testando resiliência com arrays ausentes\r\n         { id: 1, title: \"Filme Estranho\", status: \"watched\", genres: undefined, director: undefined },\r\n      ];\r\n\r\n      const filters = {\r\n         viewMode: \"watched\" as const,\r\n         searchTerm: \"\",\r\n         selectedGenre: \"Ação\", \r\n         selectedDirector: \"Nolan\", \r\n         onlyNational: false,\r\n         onlyOscar: false,\r\n         onlyInternational: false,\r\n      };\r\n\r\n      // A função deve simplesmente ocultar o filme, mas NUNCA lançar um erro (ex: undefined is not iterable)\r\n      const result = filterMovies(moviesWithoutData, filters);\r\n      expect(result).toHaveLength(0); \r\n   });\r\n\r\n   it(\"deve ser case-insensitive e ignorar espaços extras na busca\", () => {\r\n      const movies: MovieData[] = [\r\n         { id: 1, title: \"Batman\", status: \"watched\" } as MovieData,\r\n      ];\r\n\r\n      const result = filterMovies(movies, { ...defaultFilters, searchTerm: \"   bAtMaN   \" });\r\n      expect(result).toHaveLength(1);\r\n   });\r\n});"},"src/features/auth/logic/__tests__/profileSync.test.ts":{"tests":[{"id":"135","name":"profileSync logic refreshes profile on home and battle routes"},{"id":"136","name":"profileSync logic does not refresh profile on external pages"},{"id":"137","name":"profileSync logic normalizes profile payload from Supabase"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { shouldRefreshProfileOnPath, toAuthProfile } from \"../profileSync\";\r\n\r\ndescribe(\"profileSync logic\", () => {\r\n   it(\"refreshes profile on home and battle routes\", () => {\r\n      expect(shouldRefreshProfileOnPath(\"/\")).toBe(true);\r\n      expect(shouldRefreshProfileOnPath(\"/batalha\")).toBe(true);\r\n   });\r\n\r\n   it(\"does not refresh profile on external pages\", () => {\r\n      expect(shouldRefreshProfileOnPath(\"/perfil\")).toBe(false);\r\n      expect(shouldRefreshProfileOnPath(\"/support\")).toBe(false);\r\n      expect(shouldRefreshProfileOnPath(\"/perfil/alguem\")).toBe(false);\r\n   });\r\n\r\n   it(\"normalizes profile payload from Supabase\", () => {\r\n      expect(toAuthProfile({ username: \"joao\", avatar_url: \"http://img\" })).toEqual({\r\n         username: \"joao\",\r\n         avatarUrl: \"http://img\",\r\n      });\r\n      expect(toAuthProfile({ username: null, avatar_url: null })).toEqual({\r\n         username: \"\",\r\n         avatarUrl: null,\r\n      });\r\n      expect(toAuthProfile(null)).toEqual({\r\n         username: \"\",\r\n         avatarUrl: null,\r\n      });\r\n   });\r\n});\r\n"},"src/features/support/services/__tests__/sendSupportEmailService.test.ts":{"tests":[{"id":"138","name":"sendSupportEmailService returns validation error for empty message"},{"id":"139","name":"sendSupportEmailService returns success when web3forms request succeeds"},{"id":"140","name":"sendSupportEmailService returns mapped error on api rejection"},{"id":"141","name":"sendSupportEmailService returns mapped error on thrown exception"}],"source":"import { describe, it, expect, vi, beforeEach, afterEach } from \"vitest\";\r\nimport { sendSupportEmail } from \"../sendSupportEmailService\";\r\n\r\ndescribe(\"sendSupportEmailService\", () => {\r\n   const originalFetch = globalThis.fetch;\r\n\r\n   beforeEach(() => {\r\n      vi.restoreAllMocks();\r\n   });\r\n\r\n   afterEach(() => {\r\n      globalThis.fetch = originalFetch;\r\n   });\r\n\r\n   it(\"returns validation error for empty message\", async () => {\r\n      const result = await sendSupportEmail(\"key\", \"   \", \"bug\");\r\n      expect(result).toEqual({\r\n         success: false,\r\n         error: \"A mensagem não pode estar vazia.\",\r\n      });\r\n   });\r\n\r\n   it(\"returns success when web3forms request succeeds\", async () => {\r\n      const fetchMock = vi.fn().mockResolvedValue({\r\n         ok: true,\r\n         json: async () => ({ success: true }),\r\n      });\r\n      globalThis.fetch = fetchMock as unknown as typeof fetch;\r\n\r\n      const result = await sendSupportEmail(\"abc\", \"Erro no login\", \"bug\", \"user@mail.com\", \"u-1\");\r\n\r\n      expect(fetchMock).toHaveBeenCalledTimes(1);\r\n      expect(result).toEqual({ success: true, error: null });\r\n   });\r\n\r\n   it(\"returns mapped error on api rejection\", async () => {\r\n      globalThis.fetch = vi.fn().mockResolvedValue({\r\n         ok: false,\r\n         json: async () => ({ success: false, message: \"bad request\" }),\r\n      }) as unknown as typeof fetch;\r\n\r\n      const result = await sendSupportEmail(\"abc\", \"Teste\", \"other\");\r\n\r\n      expect(result).toEqual({\r\n         success: false,\r\n         error: \"Falha ao enviar email: bad request\",\r\n      });\r\n   });\r\n\r\n   it(\"returns mapped error on thrown exception\", async () => {\r\n      globalThis.fetch = vi.fn().mockRejectedValue(new Error(\"network\")) as unknown as typeof fetch;\r\n\r\n      const result = await sendSupportEmail(\"abc\", \"Teste\", \"other\");\r\n\r\n      expect(result).toEqual({\r\n         success: false,\r\n         error: \"Falha ao enviar email: network\",\r\n      });\r\n   });\r\n});\r\n"},"src/features/notifications/logic/__tests__/notificationOperations.test.ts":{"tests":[{"id":"142","name":"notificationOperations (Functional Core) 1. formatNotifications deve achatar o array do sender gerado pelo Supabase"},{"id":"143","name":"notificationOperations (Functional Core) 1. formatNotifications deve lidar corretamente se o sender já for um objeto simples"},{"id":"144","name":"notificationOperations (Functional Core) 1. formatNotifications Sad Path: deve retornar array vazio se receber nulo ou undefined"},{"id":"145","name":"notificationOperations (Functional Core) 2. countUnread deve contar corretamente as notificações não lidas"},{"id":"146","name":"notificationOperations (Functional Core) 2. countUnread Sad Path: deve retornar 0 se receber array vazio ou nulo"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { formatNotifications, countUnread, type RawNotification } from \"../notificationOperations\";\r\nimport type { AppNotification } from \"@/types\";\r\n\r\ndescribe(\"notificationOperations (Functional Core)\", () => {\r\n\r\n   describe(\"1. formatNotifications\", () => {\r\n      it(\"deve achatar o array do sender gerado pelo Supabase\", () => {\r\n         const rawData: RawNotification[] = [\r\n            {\r\n               id: \"1\", user_id: \"u1\", type: \"general\", message: \"Olá\", is_read: false, created_at: \"\",\r\n               sender: [{ username: \"joao\", avatar_url: \"url1\" }] \r\n            }\r\n         ];\r\n\r\n         const result = formatNotifications(rawData);\r\n         \r\n         expect(Array.isArray(result[0].sender)).toBe(false);\r\n         expect(result[0].sender?.username).toBe(\"joao\");\r\n      });\r\n\r\n      it(\"deve lidar corretamente se o sender já for um objeto simples\", () => {\r\n         const rawData: RawNotification[] = [\r\n            {\r\n               id: \"1\", user_id: \"u1\", type: \"general\", message: \"Olá\", is_read: false, created_at: \"\",\r\n               sender: { username: \"maria\", avatar_url: \"url2\" }\r\n            }\r\n         ];\r\n\r\n         const result = formatNotifications(rawData);\r\n         expect(result[0].sender?.username).toBe(\"maria\");\r\n      });\r\n\r\n      it(\"Sad Path: deve retornar array vazio se receber nulo ou undefined\", () => {\r\n         expect(formatNotifications(null)).toEqual([]);\r\n         expect(formatNotifications(undefined)).toEqual([]);\r\n      });\r\n   });\r\n\r\n   describe(\"2. countUnread\", () => {\r\n      it(\"deve contar corretamente as notificações não lidas\", () => {\r\n         const notifications = [\r\n            { is_read: true },\r\n            { is_read: false },\r\n            { is_read: false },\r\n         ] as AppNotification[];\r\n\r\n         expect(countUnread(notifications)).toBe(2);\r\n      });\r\n\r\n      it(\"Sad Path: deve retornar 0 se receber array vazio ou nulo\", () => {\r\n         expect(countUnread([])).toBe(0);\r\n         expect(countUnread(null)).toBe(0);\r\n      });\r\n   });\r\n\r\n});"},"src/features/profile/logic/__tests__/profileInput.test.ts":{"tests":[{"id":"147","name":"profileInput logic sanitizes username"},{"id":"148","name":"profileInput logic validates username length"},{"id":"149","name":"profileInput logic validates password change rules"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport {\r\n   sanitizeUsername,\r\n   validatePasswordChange,\r\n   validateUsername,\r\n} from \"../profileInput\";\r\n\r\ndescribe(\"profileInput logic\", () => {\r\n   it(\"sanitizes username\", () => {\r\n      expect(sanitizeUsername(\"Joao.Vitor_123!!\")).toBe(\"joaovitor_123\");\r\n   });\r\n\r\n   it(\"validates username length\", () => {\r\n      expect(validateUsername(\"ab\")).toEqual({\r\n         valid: false,\r\n         error: \"O nome de usuário deve ter pelo menos 3 caracteres.\",\r\n      });\r\n\r\n      expect(validateUsername(\"abc\")).toEqual({ valid: true, error: null });\r\n   });\r\n\r\n   it(\"validates password change rules\", () => {\r\n      expect(validatePasswordChange(\"\", \"123456\", \"123456\")).toEqual({\r\n         valid: false,\r\n         error: \"Digite a sua senha atual para continuar.\",\r\n      });\r\n\r\n      expect(validatePasswordChange(\"old\", \"123456\", \"12345\")).toEqual({\r\n         valid: false,\r\n         error: \"As novas senhas não coincidem!\",\r\n      });\r\n\r\n      expect(validatePasswordChange(\"old\", \"123\", \"123\")).toEqual({\r\n         valid: false,\r\n         error: \"A nova senha deve ter pelo menos 6 caracteres.\",\r\n      });\r\n\r\n      expect(validatePasswordChange(\"old\", \"123456\", \"123456\")).toEqual({\r\n         valid: true,\r\n         error: null,\r\n      });\r\n   });\r\n});\r\n"},"src/features/share/logic/__tests__/shareOperations.test.ts":{"tests":[{"id":"150","name":"shareOperations (Functional Core) 1. buildShareUrl deve redirecionar a raiz ('/') para o perfil do usuário se ele estiver logado"},{"id":"151","name":"shareOperations (Functional Core) 1. buildShareUrl deve manter a rota atual se não estiver na raiz, mesmo logado"},{"id":"152","name":"shareOperations (Functional Core) 1. buildShareUrl deve usar o id interno caso o tmdb_id não exista (Sad Path/Fallback)"},{"id":"153","name":"shareOperations (Functional Core) 2. buildShareContent deve montar o título e o texto da mensagem corretamente"},{"id":"154","name":"shareOperations (Functional Core) 2. buildShareContent Sad Path: deve usar um fallback seguro se o título for vazio"},{"id":"155","name":"shareOperations (Functional Core) 3. buildImageFileName deve gerar o nome do arquivo da imagem de forma previsível (Função Pura)"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { buildShareUrl, buildShareContent, buildImageFileName } from \"../shareOperations\";\r\nimport type { MovieData } from \"@/types\";\r\n\r\ndescribe(\"shareOperations (Functional Core)\", () => {\r\n\r\n   describe(\"1. buildShareUrl\", () => {\r\n      it(\"deve redirecionar a raiz ('/') para o perfil do usuário se ele estiver logado\", () => {\r\n         const movie = { tmdb_id: 123 } as MovieData;\r\n         const url = buildShareUrl(movie, \"/\", \"joao123\");\r\n         \r\n         expect(url).toBe(\"https://jj-reviews.vercel.app/perfil/joao123?movie=123\");\r\n      });\r\n\r\n      it(\"deve manter a rota atual se não estiver na raiz, mesmo logado\", () => {\r\n         const movie = { tmdb_id: 456 } as MovieData;\r\n         const url = buildShareUrl(movie, \"/listas/favoritos\", \"joao123\");\r\n         \r\n         expect(url).toBe(\"https://jj-reviews.vercel.app/listas/favoritos?movie=456\");\r\n      });\r\n\r\n      it(\"deve usar o id interno caso o tmdb_id não exista (Sad Path/Fallback)\", () => {\r\n         const movie = { id: 999 } as MovieData; // Sem tmdb_id\r\n         const url = buildShareUrl(movie, \"/\", null); // Sem username\r\n         \r\n         expect(url).toBe(\"https://jj-reviews.vercel.app/?movie=999\");\r\n      });\r\n   });\r\n\r\n   describe(\"2. buildShareContent\", () => {\r\n      it(\"deve montar o título e o texto da mensagem corretamente\", () => {\r\n         const content = buildShareContent(\"Batman\");\r\n         expect(content.title).toBe(\"Review de Batman\");\r\n         expect(content.text).toBe(\"Confira a minha avaliação de Batman no JJ Reviews!\");\r\n      });\r\n\r\n      it(\"Sad Path: deve usar um fallback seguro se o título for vazio\", () => {\r\n         const content = buildShareContent(\"\");\r\n         expect(content.title).toBe(\"Review de Filme\");\r\n      });\r\n   });\r\n\r\n   describe(\"3. buildImageFileName\", () => {\r\n      it(\"deve gerar o nome do arquivo da imagem de forma previsível (Função Pura)\", () => {\r\n         const timestamp = 1600000000000;\r\n         const fileName = buildImageFileName(123, timestamp);\r\n         expect(fileName).toBe(\"review-123-1600000000000.png\");\r\n      });\r\n   });\r\n});"},"src/features/dashboard/logic/__tests__/calculateStats.test.ts":{"tests":[{"id":"156","name":"calculateDashboardStats (Functional Core) deve calcular a média correta apenas dos filmes assistidos com nota"},{"id":"157","name":"calculateDashboardStats (Functional Core) deve somar o runtime corretamente"},{"id":"158","name":"calculateDashboardStats (Functional Core) deve calcular a percentagem de filmes internacionais (que não contêm EUA)"},{"id":"159","name":"calculateDashboardStats (Functional Core) deve encontrar o diretor mais frequente (se tiver 2 ou mais filmes)"},{"id":"160","name":"calculateDashboardStats (Functional Core) deve retornar null para o diretor se todos tiverem apenas 1 filme"},{"id":"161","name":"Sad Paths (Tratamento de Falhas e Dados Ausentes) não deve contar 'Desconhecido' ou 'Diretor Desconhecido' como Diretor Favorito"},{"id":"162","name":"Sad Paths (Tratamento de Falhas e Dados Ausentes) deve lidar de forma segura com valores nulos ou inválidos no runtime e ratings"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { calculateDashboardStats } from \"../calculateStats\";\r\nimport type { MovieData } from \"@/types\";\r\n\r\nconst makeMovie = (overrides: Partial<"+"MovieData> = {}): MovieData => ({\r\n   id: 1,\r\n   tmdb_id: 100,\r\n   rating: null,\r\n   review: \"\",\r\n   recommended: \"\",\r\n   created_at: \"2025-01-01\",\r\n   status: \"watched\",\r\n   runtime: 0,\r\n   ...overrides,\r\n} as MovieData);\r\n\r\ndescribe(\"calculateDashboardStats (Functional Core)\", () => {\r\n   \r\n   it(\"deve calcular a média correta apenas dos filmes assistidos com nota\", () => {\r\n      const movies = [\r\n         makeMovie({ rating: 8, status: \"watched\" }),\r\n         makeMovie({ rating: 6, status: \"watched\" }),\r\n         makeMovie({ rating: null, status: \"watchlist\" }), // Deve ser ignorado (não assistido)\r\n         makeMovie({ rating: null, status: \"watched\" }), // Deve ser ignorado (sem nota)\r\n      ];\r\n\r\n      const stats = calculateDashboardStats(movies);\r\n      \r\n      expect(stats.totalMovies).toBe(3); // 3 assistidos (mesmo o que não tem nota conta como filme visto)\r\n      expect(stats.averageRating).toBe(7); \r\n   });\r\n\r\n   it(\"deve somar o runtime corretamente\", () => {\r\n      const movies = [\r\n         makeMovie({ runtime: 120, status: \"watched\" }),\r\n         makeMovie({ runtime: 90, status: \"watched\" }),\r\n         makeMovie({ runtime: 150, status: \"watchlist\" }), // Ignorado\r\n      ];\r\n\r\n      const stats = calculateDashboardStats(movies);\r\n      \r\n      expect(stats.totalRuntimeMinutes).toBe(210); \r\n   });\r\n\r\n   it(\"deve calcular a percentagem de filmes internacionais (que não contêm EUA)\", () => {\r\n      const movies = [\r\n         makeMovie({ countries: [\"Estados Unidos\", \"Brasil\"], status: \"watched\" }), \r\n         makeMovie({ countries: [\"França\"], status: \"watched\" }),\r\n         makeMovie({ countries: [\"Japão\"], status: \"watched\" }),\r\n         makeMovie({ countries: [\"França\"], status: \"watchlist\" }), \r\n      ];\r\n\r\n      const stats = calculateDashboardStats(movies);\r\n      \r\n      expect(stats.internationalCount).toBe(2);\r\n      expect(stats.internationalPercent).toBe(67);\r\n   });\r\n\r\n   it(\"deve encontrar o diretor mais frequente (se tiver 2 ou mais filmes)\", () => {\r\n      const movies = [\r\n         makeMovie({ director: \"Christopher Nolan\", status: \"watched\" }),\r\n         makeMovie({ director: \"Christopher Nolan\", status: \"watched\" }),\r\n         makeMovie({ director: \"Quentin Tarantino\", status: \"watched\" }),\r\n         makeMovie({ director: \"Martin Scorsese\", status: \"watchlist\" }),\r\n      ];\r\n\r\n      const stats = calculateDashboardStats(movies);\r\n      \r\n      expect(stats.topDirector).toEqual({ name: \"Christopher Nolan\", count: 2 });\r\n   });\r\n\r\n   it(\"deve retornar null para o diretor se todos tiverem apenas 1 filme\", () => {\r\n      const movies = [\r\n         makeMovie({ director: \"Nolan\", status: \"watched\" }),\r\n         makeMovie({ director: \"Tarantino\", status: \"watched\" }),\r\n      ];\r\n\r\n      const stats = calculateDashboardStats(movies);\r\n      \r\n      expect(stats.topDirector).toBeNull();\r\n   });\r\n\r\n});\r\n\r\ndescribe(\"Sad Paths (Tratamento de Falhas e Dados Ausentes)\", () => {\r\n   it(\"não deve contar 'Desconhecido' ou 'Diretor Desconhecido' como Diretor Favorito\", () => {\r\n      const movies = [\r\n         makeMovie({ director: \"Desconhecido\", status: \"watched\" }),\r\n         makeMovie({ director: \"Desconhecido\", status: \"watched\" }),\r\n         makeMovie({ director: \"Diretor Desconhecido\", status: \"watched\" }),\r\n      ];\r\n\r\n      const stats = calculateDashboardStats(movies);\r\n      \r\n      // O Dashboard não pode dizer que o diretor favorito é o senhor \"Desconhecido\"\r\n      expect(stats.topDirector).toBeNull(); \r\n   });\r\n\r\n   it(\"deve lidar de forma segura com valores nulos ou inválidos no runtime e ratings\", () => {\r\n      const movies = [\r\n         makeMovie({ runtime: undefined, rating: null, status: \"watched\" }),\r\n         makeMovie({ runtime: -50, rating: 999, status: \"watched\" }), \r\n      ];\r\n\r\n      const stats = calculateDashboardStats(movies);\r\n      \r\n      expect(stats.totalMovies).toBe(2);\r\n      expect(stats.totalRuntimeMinutes).toBe(0); \r\n   });\r\n});"},"src/features/support/logic/__tests__/sendSupportEmail.test.ts":{"tests":[{"id":"163","name":"support logic validates empty message"},{"id":"164","name":"support logic builds payload with defaults"},{"id":"165","name":"support logic maps success and failure api responses"},{"id":"166","name":"support logic maps unknown error"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport {\r\n   buildSupportEmailPayload,\r\n   mapSupportEmailApiResult,\r\n   mapSupportEmailUnknownError,\r\n   validateSupportMessage,\r\n} from \"../sendSupportEmail\";\r\n\r\ndescribe(\"support logic\", () => {\r\n   it(\"validates empty message\", () => {\r\n      expect(validateSupportMessage(\"   \")).toEqual({\r\n         success: false,\r\n         error: \"A mensagem não pode estar vazia.\",\r\n      });\r\n   });\r\n\r\n   it(\"builds payload with defaults\", () => {\r\n      const payload = buildSupportEmailPayload(\"key\", \"Ajuda\", \"bug\");\r\n      expect(payload.access_key).toBe(\"key\");\r\n      expect(payload.email).toBe(\"anonimo@jjreviews.com\");\r\n      expect(payload.subject).toContain(\"BUG\");\r\n   });\r\n\r\n   it(\"maps success and failure api responses\", () => {\r\n      expect(mapSupportEmailApiResult(true, { success: true })).toEqual({\r\n         success: true,\r\n         error: null,\r\n      });\r\n\r\n      expect(mapSupportEmailApiResult(false, { success: false, message: \"bad request\" })).toEqual({\r\n         success: false,\r\n         error: \"Falha ao enviar email: bad request\",\r\n      });\r\n   });\r\n\r\n   it(\"maps unknown error\", () => {\r\n      expect(mapSupportEmailUnknownError(new Error(\"timeout\"))).toEqual({\r\n         success: false,\r\n         error: \"Falha ao enviar email: timeout\",\r\n      });\r\n   });\r\n});\r\n"},"src/features/lists/logic/__tests__/listSocial.test.ts":{"tests":[{"id":"167","name":"listSocial Logic deve gerar o título de cópia corretamente"},{"id":"168","name":"listSocial Logic deve formatar a URL de compartilhamento corretamente"},{"id":"169","name":"listSocial Logic deve gerar URL com caminho raiz quando nao houver dono"},{"id":"170","name":"listSocial Logic deve usar origin fallback quando window nao estiver disponivel"},{"id":"171","name":"listSocial Logic deve identificar tipos que exigem colaboradores imediatos"}],"source":"import { describe, it, expect, vi, afterEach } from \"vitest\";\r\nimport { buildListShareUrl, generateDuplicateTitle, requiresImmediateCollaborators } from \"../listSocial\";\r\n\r\nafterEach(() => {\r\n  vi.unstubAllGlobals();\r\n});\r\n\r\ndescribe(\"listSocial Logic\", () => {\r\n  it(\"deve gerar o título de cópia corretamente\", () => {\r\n    expect(generateDuplicateTitle(\"Favoritos\")).toBe(\"Favoritos (Cópia)\");\r\n  });\r\n\r\n  it(\"deve formatar a URL de compartilhamento corretamente\", () => {\r\n    const url = buildListShareUrl(\"123\", \"joao\");\r\n    expect(url).toBe(`${window.location.origin}/perfil/joao?aba=lists&listId=123`);\r\n  });\r\n\r\n  it(\"deve gerar URL com caminho raiz quando nao houver dono\", () => {\r\n    const url = buildListShareUrl(\"123\", \"\");\r\n    expect(url).toBe(`${window.location.origin}/?aba=lists&listId=123`);\r\n  });\r\n\r\n  it(\"deve usar origin fallback quando window nao estiver disponivel\", () => {\r\n    vi.stubGlobal(\"window\", undefined);\r\n    const url = buildListShareUrl(\"123\", \"joao\");\r\n    expect(url).toBe(\"https://jj-reviews.vercel.app/perfil/joao?aba=lists&listId=123\");\r\n  });\r\n\r\n  it(\"deve identificar tipos que exigem colaboradores imediatos\", () => {\r\n    expect(requiresImmediateCollaborators(\"private\")).toBe(false);\r\n    expect(requiresImmediateCollaborators(\"partial_shared\")).toBe(true);\r\n    expect(requiresImmediateCollaborators(\"full_shared\")).toBe(true);\r\n  });\r\n});"},"src/features/recommendations/services/__tests__/recommendationService.test.ts":{"tests":[{"id":"172","name":"recommendationService prioritizes matching genres and excludes known movies"},{"id":"173","name":"recommendationService returns starter suggestions when user has no watched history"},{"id":"174","name":"recommendationService extracts favorite genre labels from user movies"},{"id":"175","name":"recommendationService normalizes labels and uses fallback for unknown genre ids"},{"id":"176","name":"recommendationService filters disliked, duplicate and invalid candidate ids"},{"id":"177","name":"recommendationService returns fallback reason when candidate has no genre/rating/recent signals"},{"id":"178","name":"recommendationService applies feedback genre adjustments to favorite labels"},{"id":"179","name":"recommendationService handles rating weights for high and low ratings"},{"id":"180","name":"recommendationService skips genres without valid genre IDs during profile building"},{"id":"181","name":"recommendationService handles decade calculation with invalid and edge years"},{"id":"182","name":"recommendationService filters out unwatched movies from profile"},{"id":"183","name":"recommendationService parses decade with non-numeric year format"},{"id":"184","name":"recommendationService handles invalid genre adjustments in feedback"},{"id":"185","name":"recommendationService weight calculation handles null rating as 0.25"},{"id":"186","name":"recommendationService weight calculation handles rating exactly at boundaries"},{"id":"187","name":"recommendationService decade calculation with exact year 1900"},{"id":"188","name":"recommendationService decade calculation with year <"+" 1900 returns null"}],"source":"import { beforeEach, describe, expect, it, vi } from \"vitest\";\r\nimport type { MovieData } from \"@/types\";\r\nimport {\r\n   getFavoriteGenreLabels,\r\n   getGenreIdFromLabel,\r\n   getGenreLabelFromId,\r\n   getPersonalizedRecommendations,\r\n} from \"../recommendationService\";\r\n\r\nvi.mock(\"@/features/movies/services/tmdbService\", () => ({\r\n   discoverMovies: vi.fn(),\r\n}));\r\n\r\nconst { discoverMovies } = await import(\"@/features/movies/services/tmdbService\");\r\n\r\nfunction movieFactory(overrides: Partial<"+"MovieData>): MovieData {\r\n   return {\r\n      id: 1,\r\n      tmdb_id: 1,\r\n      rating: 4,\r\n      review: \"\",\r\n      recommended: \"\",\r\n      created_at: \"2024-01-01T00:00:00.000Z\",\r\n      title: \"Movie\",\r\n      status: \"watched\",\r\n      genres: [\"Acao\"],\r\n      ...overrides,\r\n   };\r\n}\r\n\r\ndescribe(\"recommendationService\", () => {\r\n   beforeEach(() => {\r\n      vi.clearAllMocks();\r\n   });\r\n\r\n   it(\"prioritizes matching genres and excludes known movies\", async () => {\r\n      vi.mocked(discoverMovies).mockResolvedValue([\r\n         { id: 100, title: \"Known Movie\", vote_average: 8.9, vote_count: 500, genre_ids: [28], poster_path: \"/a.jpg\" },\r\n         { id: 200, title: \"Action Pick\", vote_average: 8.0, vote_count: 400, genre_ids: [28], poster_path: \"/b.jpg\" },\r\n         { id: 300, title: \"Drama Pick\", vote_average: 8.2, vote_count: 600, genre_ids: [18], poster_path: \"/c.jpg\" },\r\n      ]);\r\n\r\n      const watched = [\r\n         movieFactory({ tmdb_id: 100, rating: 5, genres: [\"Acao\"] }),\r\n         movieFactory({ tmdb_id: 101, rating: 4.5, genres: [\"Aventura\"] }),\r\n      ];\r\n\r\n      const result = await getPersonalizedRecommendations(watched, 5);\r\n\r\n      expect(result.some((item) => item.movie.tmdb_id === 100)).toBe(false);\r\n      expect(result[0]?.movie.tmdb_id).toBe(200);\r\n      expect(result[0]?.reasons.length).toBeGreaterThan(0);\r\n   });\r\n\r\n   it(\"returns starter suggestions when user has no watched history\", async () => {\r\n      vi.mocked(discoverMovies).mockResolvedValue([\r\n         { id: 400, title: \"Popular One\", vote_average: 7.5, vote_count: 1000, genre_ids: [35], poster_path: \"/d.jpg\" },\r\n      ]);\r\n\r\n      const result = await getPersonalizedRecommendations([], 5);\r\n\r\n      expect(result).toHaveLength(1);\r\n      expect(result[0]?.reasons).toContain(\"Sugestão inicial baseada em filmes populares\");\r\n   });\r\n\r\n   it(\"extracts favorite genre labels from user movies\", () => {\r\n      const labels = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 501, genres: [\"Acao\"], rating: 5 }),\r\n         movieFactory({ tmdb_id: 502, genres: [\"Comedia\"], rating: 4 }),\r\n      ]);\r\n\r\n      expect(labels).toContain(\"Acao\");\r\n      expect(labels.length).toBeGreaterThan(0);\r\n   });\r\n\r\n   it(\"normalizes labels and uses fallback for unknown genre ids\", () => {\r\n      expect(getGenreIdFromLabel(\"Ação\")).toBe(28);\r\n      expect(getGenreIdFromLabel(\" ficção \")).toBe(878);\r\n      expect(getGenreLabelFromId(999999)).toBe(\"Gênero\");\r\n   });\r\n\r\n   it(\"filters disliked, duplicate and invalid candidate ids\", async () => {\r\n      vi.mocked(discoverMovies).mockResolvedValue([\r\n         { id: -1, title: \"Invalid\", vote_average: 8, vote_count: 400, genre_ids: [28] },\r\n         { id: 700, title: \"Duplicate A\", vote_average: 8, vote_count: 400, genre_ids: [28] },\r\n         { id: 700, title: \"Duplicate B\", vote_average: 7, vote_count: 300, genre_ids: [28] },\r\n         { id: 701, title: \"Disliked\", vote_average: 8, vote_count: 400, genre_ids: [28] },\r\n         { id: 702, title: \"Final\", vote_average: 6, vote_count: 100, genre_ids: [] },\r\n      ]);\r\n\r\n      const result = await getPersonalizedRecommendations(\r\n         [movieFactory({ tmdb_id: 50, rating: 5, genres: [\"Acao\"] })],\r\n         10,\r\n         { genreAdjustments: {}, dislikedMovieIds: [701] },\r\n      );\r\n\r\n      expect(result.some((item) => item.movie.tmdb_id === -1)).toBe(false);\r\n      expect(result.some((item) => item.movie.tmdb_id === 701)).toBe(false);\r\n      expect(result.filter((item) => item.movie.tmdb_id === 700)).toHaveLength(1);\r\n      expect(result.map((item) => item.movie.tmdb_id)).toContain(702);\r\n   });\r\n\r\n   it(\"returns fallback reason when candidate has no genre/rating/recent signals\", async () => {\r\n      vi.mocked(discoverMovies).mockResolvedValue([\r\n         { id: 800, title: \"No Signals\", vote_average: 0, vote_count: 0, genre_ids: [], release_date: \"1980-01-01\" },\r\n      ]);\r\n\r\n      const result = await getPersonalizedRecommendations([\r\n         movieFactory({ tmdb_id: 1000, rating: 4, genres: [\"Acao\"], release_date: \"2000-01-01\" }),\r\n      ]);\r\n\r\n      expect(result).toHaveLength(1);\r\n      expect(result[0].reasons).toContain(\"Combinação de popularidade e potencial para seu perfil\");\r\n      expect(result[0].movie.director).toBe(\"Não informado\");\r\n   });\r\n\r\n   it(\"applies feedback genre adjustments to favorite labels\", () => {\r\n      const labels = getFavoriteGenreLabels(\r\n         [movieFactory({ tmdb_id: 100, rating: 4, genres: [\"Acao\"] })],\r\n         {\r\n            genreAdjustments: { 18: 10, 999: 4 },\r\n            dislikedMovieIds: [],\r\n         },\r\n      );\r\n\r\n      expect(labels[0]).toBe(\"Drama\");\r\n   });\r\n\r\n   it(\"handles rating weights for high and low ratings\", () => {\r\n      const highRatedMovie = movieFactory({ tmdb_id: 201, rating: 5, genres: [\"Acao\"], status: \"watched\" });\r\n      const lowRatedMovie = movieFactory({ tmdb_id: 202, rating: 1.5, genres: [\"Acao\"], status: \"watched\" });\r\n      const mediumRatedMovie = movieFactory({ tmdb_id: 203, rating: 3, genres: [\"Acao\"], status: \"watched\" });\r\n\r\n      const highLabels = getFavoriteGenreLabels([highRatedMovie]);\r\n      const lowLabels = getFavoriteGenreLabels([lowRatedMovie]);\r\n      const mediumLabels = getFavoriteGenreLabels([mediumRatedMovie]);\r\n\r\n      expect(highLabels).toBeDefined();\r\n      expect(lowLabels).toBeDefined();\r\n      expect(mediumLabels).toBeDefined();\r\n   });\r\n\r\n   it(\"skips genres without valid genre IDs during profile building\", () => {\r\n      const labels = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 300, rating: 4, genres: [\"Acao\", \"GeneroInvalidoQualquer\"], status: \"watched\" }),\r\n      ]);\r\n\r\n      expect(labels).toBeDefined();\r\n      expect(labels.length).toBeGreaterThan(0);\r\n   });\r\n\r\n   it(\"handles decade calculation with invalid and edge years\", () => {\r\n      const profile1 = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 400, rating: 4, genres: [\"Acao\"], release_date: \"1800-01-01\", status: \"watched\" }),\r\n      ]);\r\n      const profile2 = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 401, rating: 4, genres: [\"Acao\"], release_date: \"\", status: \"watched\" }),\r\n      ]);\r\n\r\n      expect(profile1).toBeDefined();\r\n      expect(profile2).toBeDefined();\r\n   });\r\n\r\n   it(\"filters out unwatched movies from profile\", async () => {\r\n      vi.mocked(discoverMovies).mockResolvedValue([\r\n         { id: 900, title: \"Test\", vote_average: 8, vote_count: 400, genre_ids: [28], release_date: \"2020-01-01\" },\r\n      ]);\r\n\r\n      const movies = [\r\n         movieFactory({ tmdb_id: 500, rating: 5, genres: [\"Acao\"], status: \"watched\" }),\r\n         movieFactory({ tmdb_id: 501, rating: null, genres: [\"Acao\"], status: \"watchlist\" }),\r\n      ];\r\n\r\n      const result = await getPersonalizedRecommendations(movies);\r\n\r\n      expect(result).toHaveLength(1);\r\n      expect(result[0].reasons.length).toBeGreaterThan(0);\r\n   });\r\n\r\n   it(\"parses decade with non-numeric year format\", () => {\r\n      const labels = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 600, rating: 4, genres: [\"Acao\"], release_date: \"abc-01-01\", status: \"watched\" }),\r\n      ]);\r\n\r\n      expect(labels).toBeDefined();\r\n   });\r\n\r\n   it(\"handles invalid genre adjustments in feedback\", () => {\r\n      const labels = getFavoriteGenreLabels(\r\n         [movieFactory({ tmdb_id: 700, rating: 4, genres: [\"Acao\"], status: \"watched\" })],\r\n         {\r\n            genreAdjustments: { 18: 5, 28: 10 },\r\n            dislikedMovieIds: [],\r\n         },\r\n      );\r\n\r\n      expect(labels).toBeDefined();\r\n      expect(labels.length).toBeGreaterThan(0);\r\n   });\r\n   it(\"weight calculation handles null rating as 0.25\", () => {\r\n      const labels = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 800, rating: null, genres: [\"Acao\"], status: \"watched\" }),\r\n      ]);\r\n\r\n      expect(labels).toBeDefined();\r\n   });\r\n\r\n   it(\"weight calculation handles rating exactly at boundaries\", () => {\r\n      const high = getFavoriteGenreLabels([movieFactory({ tmdb_id: 801, rating: 4, genres: [\"Acao\"], status: \"watched\" })]);\r\n      const low = getFavoriteGenreLabels([movieFactory({ tmdb_id: 802, rating: 2.5, genres: [\"Comedia\"], status: \"watched\" })]);\r\n      const mid = getFavoriteGenreLabels([movieFactory({ tmdb_id: 803, rating: 3, genres: [\"Drama\"], status: \"watched\" })]);\r\n\r\n      expect(high).toBeDefined();\r\n      expect(low).toBeDefined();\r\n      expect(mid).toBeDefined();\r\n   });\r\n\r\n   it(\"decade calculation with exact year 1900\", () => {\r\n      const labels = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 804, rating: 4, genres: [\"Acao\"], release_date: \"1900-01-01\", status: \"watched\" }),\r\n      ]);\r\n\r\n      expect(labels).toBeDefined();\r\n   });\r\n\r\n   it(\"decade calculation with year <"+" 1900 returns null\", () => {\r\n      const labels = getFavoriteGenreLabels([\r\n         movieFactory({ tmdb_id: 805, rating: 4, genres: [\"Acao\"], release_date: \"1899-01-01\", status: \"watched\" }),\r\n      ]);\r\n\r\n      expect(labels).toBeDefined();\r\n   });\r\n});\r\n"},"src/features/friends/logic/__tests__/mapFriendshipStatus.test.ts":{"tests":[{"id":"189","name":"mapFriendshipStatus (Functional Core) Caminhos de Corretude deve retornar 'self' se o usuário estiver vendo o próprio perfil"},{"id":"190","name":"mapFriendshipStatus (Functional Core) Caminhos de Corretude deve retornar 'none' se não houver registro de amizade"},{"id":"191","name":"mapFriendshipStatus (Functional Core) Caminhos de Corretude deve retornar 'friends' se o convite foi aceito"},{"id":"192","name":"mapFriendshipStatus (Functional Core) Caminhos de Corretude deve retornar 'request_sent' se o usuário logado enviou o convite pendente"},{"id":"193","name":"mapFriendshipStatus (Functional Core) Caminhos de Corretude deve retornar 'request_received' se o usuário logado recebeu o convite pendente"},{"id":"194","name":"mapFriendshipStatus (Functional Core) Tratamento de Falhas deve retornar 'none' se a amizade foi recusada ('declined')"},{"id":"195","name":"mapFriendshipStatus (Functional Core) Tratamento de Falhas deve retornar 'none' de forma segura se faltarem os IDs dos usuários"}],"source":"import { describe, it, expect } from \"vitest\";\r\nimport { mapFriendshipStatus } from \"./../mapFriendshipStatus\";\r\nimport type { Friendship } from \"@/types\";\r\n\r\ndescribe(\"mapFriendshipStatus (Functional Core)\", () => {\r\n   \r\n   describe(\"Caminhos de Corretude\", () => {\r\n      it(\"deve retornar 'self' se o usuário estiver vendo o próprio perfil\", () => {\r\n         const status = mapFriendshipStatus(\"user_123\", \"user_123\", null);\r\n         expect(status).toBe(\"self\");\r\n      });\r\n\r\n      it(\"deve retornar 'none' se não houver registro de amizade\", () => {\r\n         const status = mapFriendshipStatus(\"user_123\", \"user_456\", null);\r\n         expect(status).toBe(\"none\");\r\n      });\r\n\r\n      it(\"deve retornar 'friends' se o convite foi aceito\", () => {\r\n         const mockFriendship: Friendship = {\r\n            id: \"f_1\", requester_id: \"user_123\", receiver_id: \"user_456\", status: \"accepted\", created_at: \"\"\r\n         };\r\n         const status = mapFriendshipStatus(\"user_123\", \"user_456\", mockFriendship);\r\n         expect(status).toBe(\"friends\");\r\n      });\r\n\r\n      it(\"deve retornar 'request_sent' se o usuário logado enviou o convite pendente\", () => {\r\n         const mockFriendship: Friendship = {\r\n            id: \"f_1\", requester_id: \"user_123\", receiver_id: \"user_456\", status: \"pending\", created_at: \"\"\r\n         };\r\n         // O currentUserId (123) é igual ao requester_id\r\n         const status = mapFriendshipStatus(\"user_123\", \"user_456\", mockFriendship);\r\n         expect(status).toBe(\"request_sent\");\r\n      });\r\n\r\n      it(\"deve retornar 'request_received' se o usuário logado recebeu o convite pendente\", () => {\r\n         const mockFriendship: Friendship = {\r\n            id: \"f_1\", requester_id: \"user_999\", receiver_id: \"user_123\", status: \"pending\", created_at: \"\"\r\n         };\r\n         // O currentUserId (123) é igual ao receiver_id\r\n         const status = mapFriendshipStatus(\"user_123\", \"user_999\", mockFriendship);\r\n         expect(status).toBe(\"request_received\");\r\n      });\r\n   });\r\n\r\n   describe(\"Tratamento de Falhas\", () => {\r\n      it(\"deve retornar 'none' se a amizade foi recusada ('declined')\", () => {\r\n         const mockFriendship: Friendship = {\r\n            id: \"f_1\", requester_id: \"user_123\", receiver_id: \"user_456\", status: \"declined\", created_at: \"\"\r\n         };\r\n         const status = mapFriendshipStatus(\"user_123\", \"user_456\", mockFriendship);\r\n         expect(status).toBe(\"none\"); // Volta à estaca zero, pode adicionar de novo\r\n      });\r\n\r\n      it(\"deve retornar 'none' de forma segura se faltarem os IDs dos usuários\", () => {\r\n         expect(mapFriendshipStatus(undefined, \"user_456\", null)).toBe(\"none\");\r\n         expect(mapFriendshipStatus(\"user_123\", undefined, null)).toBe(\"none\");\r\n      });\r\n   });\r\n});"}},"projectRoot":"C:\\Users\\joaov\\Projetos GIT\\VVS JJ Reviews\\Projeto_VVS\\frontend","config":{"$schema":"./node_modules/@stryker-mutator/core/schema/stryker-schema.json","packageManager":"npm","reporters":["html","clear-text","progress"],"testRunner":"vitest","coverageAnalysis":"perTest","mutate":["src/logic/**/*.ts","src/features/*/logic/**/*.ts","!src/**/*.test.ts","!s
